          // try to set document title
          var l = ['h1', 'h2', 'h3'];
          for (var i = 0; i < l.length; i++) {
            var h = document.getElementsByTagName(l[i]);
            if (h.length > 0) {
              document.title = '[vados-dev] nginx-rpmbuild :: ' + h[0].innerText;
