<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>[ Ошибка ] :: <!--# echo var="status" default="" --> &ndash; <!--# echo var="status_text" default="" --> </title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/png" href="/_inc/icons/git-favicon.png" />
    <meta name="author" content="Vados" />
    <link rel="stylesheet" href="/error-page.css" />
    <script>
        function backAway(){
            if(history.length === 1){
                window.location = "/"
            } else {
                history.back();
            }
        }
    </script>
</head>

<body>
<div class="container">
    <div class="left">
        <svg
            width="300"
            height="300"
            viewBox="0 0 300 300"
            xmlns="http://www.w3.org/2000/svg"
        >
            <path
                d="M153.01 33.2a6 6 0 0 1 2.18 2.18l129.7 223.61a6 6 0 0 1-5.19 9.01H20.3a6 6 0 0 1-5.2-9.01L144.8 35.38a6 6 0 0 1 8.21-2.18ZM150.02 204a14.01 14.01 0 1 0-.02 28.02 14.01 14.01 0 0 0 .02-28.02Zm4.8-89h-9.65a6 6 0 0 0-6 6.17l1.5 52a6 6 0 0 0 6 5.83h6.67a6 6 0 0 0 6-5.83l1.48-52a6 6 0 0 0-6-6.17Z"
                fill="#000"
                fill-rule="evenodd"
            />
        </svg>
    </div>
    <div class="right">
      <div class="content">
        <div class="text-container">
            <div class="border-bottom">
            <h1 class="code">
                <!--# echo var="status" -->
            </h1>
            <div class="status">
                <h2>
                <!--# echo var="status_text" -->
                </h2>
            </div>
            </div>
            <div class="description">
                 <!--# if expr="$status_mess" -->
                <p><!--# echo var="status_mess" --></p>
                <!--# else -->
                <p>Описание ошибки отсутствует.<br />
                    НО!<br />
                    Если Вам действительно интересен смысл данной ошибки, попробуйте найти её описание по номеру, в известных поисковых системах.</p>
                <!--# endif -->
                <div class="gray-top">
                    <p>Приносим извинения за предоставленные неудобства.</p>
                </div>
            </div>
            <div class="button-container">
                <a href="#" onClick="backAway()" class="button">Вернуться назад</a>
            </div>
            </div>
            <div class="footer">                
                <p>Адрес запроса: %{request_addr}.</p>                
                Nginx на <!--# echo var="host" default="localhost" -->                
            </div>
        </div>
      </div>
    </div>
</div>
</body>
</html>
