name: Build CI Image

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override (e.g. v0.0.1b). Empty => auto-increment vX.Y.Z"
        required: false
        default: ""
        type: string
      push_latest:
        description: "Also update :latest and :lts tags"
        required: false
        default: true
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_ref_sha: ${{ steps.meta.outputs.image_ref_sha }}
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${repo_lc}/ci"
          tag_input="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}"

          next_tag() {
            local t="$1"
            local major minor patch
            major="${t#v}"; major="${major%%.*}"
            minor="${t#v${major}.}"; minor="${minor%%.*}"
            patch="${t##*.}"
            if (( patch < 99 )); then
              patch=$((patch + 1))
            elif (( minor < 99 )); then
              minor=$((minor + 1))
              patch=0
            elif (( major < 99 )); then
              major=$((major + 1))
              minor=0
              patch=0
            else
              echo "Tag range exhausted at ${t}" >&2
              return 1
            fi
            printf 'v%d.%d.%d\n' "${major}" "${minor}" "${patch}"
          }

          if [[ -n "${tag_input}" ]]; then
            tag="${tag_input}"
          else
            owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
            repo_name="${GITHUB_REPOSITORY#*/}"
            package_name="${repo_name}/ci"
            package_name_enc="${package_name//\//%2F}"
            versions_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/users/${owner_lc}/packages/container/${package_name_enc}/versions?per_page=100" 2>/dev/null || echo '[]')"
            latest_numeric_tag="$(
              jq -r '.[].metadata.container.tags[]? // empty' <<< "${versions_json}" \
                | grep -E '^v[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{1,2}$' \
                | sort -V \
                | tail -n1 || true
            )"
            if [[ -z "${latest_numeric_tag}" ]]; then
              tag="v0.0.1"
            else
              tag="$(next_tag "${latest_numeric_tag}")"
            fi
          fi
          tag_sanitized="$(echo "${tag}" | tr '/:@ ' '-' | tr -cd 'a-zA-Z0-9._-')"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag_sanitized}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image}:${tag_sanitized}" >> "${GITHUB_OUTPUT}"
          echo "image_ref_sha=${image}:sha-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}

      - name: Push latest/lts tags
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.push_latest }}
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.image }}:latest" \
            -t "${{ steps.meta.outputs.image }}:lts" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}"

      - name: Update default ci_container_image in check-version workflow
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          PUSH_TOKEN: ${{ secrets.amsternl != '' && secrets.amsternl || '' }}
        run: |
          set -euo pipefail
          image_ref="${{ steps.meta.outputs.image_ref }}"
          file=".github/workflows/check-version.yml"
          tmp="$(mktemp)"
          awk -v new_default="${image_ref}" '
            BEGIN { in_block=0; updated=0 }
            /^[[:space:]]*ci_container_image:[[:space:]]*$/ { in_block=1 }
            {
              if (in_block && $0 ~ /^[[:space:]]*default:[[:space:]]*"/ && !updated) {
                sub(/default:[[:space:]]*"[^"]*"/, "default: \"" new_default "\"")
                in_block=0
                updated=1
              }
              print
            }
            END {
              if (!updated) {
                print "Failed to update ci_container_image default in " FILENAME > "/dev/stderr"
                exit 1
              }
            }
          ' "${file}" > "${tmp}"
          mv "${tmp}" "${file}"

          if ! git diff --quiet -- "${file}"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${file}"
            git commit -m "ci: set check-version default container to ${image_ref}"
            if [[ -n "${PUSH_TOKEN}" ]]; then
              git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              git push origin "HEAD:${GITHUB_REF_NAME}"
            else
              echo "PUSH_TOKEN is empty; skipped auto-push of ${file}" >&2
            fi
          fi

      - name: Save image metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > ci-image.env <<EOF
          CI_IMAGE=${{ steps.meta.outputs.image }}
          CI_IMAGE_TAG=${{ steps.meta.outputs.tag }}
          CI_IMAGE_SHA_TAG=${{ steps.meta.outputs.sha_tag }}
          CI_IMAGE_REF=${{ steps.meta.outputs.image_ref }}
          CI_IMAGE_REF_SHA=${{ steps.meta.outputs.image_ref_sha }}
          EOF

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-image-metadata
          path: ci-image.env
          if-no-files-found: error

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### CI image metadata"
            echo
            echo "- image: \`${{ steps.meta.outputs.image }}\`"
            echo "- tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- sha tag: \`${{ steps.meta.outputs.sha_tag }}\`"
            echo "- image ref: \`${{ steps.meta.outputs.image_ref }}\`"
            echo "- image ref sha: \`${{ steps.meta.outputs.image_ref_sha }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Print usage hint
        shell: bash
        run: |
          echo "Use this image in workflows:"
          echo "  ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          echo "  ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            echo "  ${{ steps.meta.outputs.image }}:latest"
            echo "  ${{ steps.meta.outputs.image }}:lts"
          fi
