name: Build CI Image

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - delete
      dockerfile:
        description: "Dockerfile in location docker/ci-images/"
        required: true
        default: "Dockerfile.rpm"
        type: string
      base_image:
        description: "Base image"
        required: true
        default: "quay.io/centos/centos:stream10"
        type: string
      build_platforms:
        description: "Platforms for build images (e.g. linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7)"
        required: true
        default: "linux/amd64"
        type: string
      image_name:
        description: "Build image name"
        required: true
        default: "centos-10"
        type: string
      image_tag:
        description: "Build mode suffix. Final tag = CI_IMAGE_VER+1(+suffix)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "b"
      delete_tags:
        description: "Delete mode: space/comma separated tags (e.g. v0.0.1b,sha-abc123)"
        required: false
        default: ""
        type: string

jobs:
  build-and-push:
    if: ${{ inputs.operation == 'build' }}
    runs-on: ubuntu-24.04
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_ref_sha: ${{ steps.meta.outputs.image_ref_sha }}
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CI_IMAGE_NAME: ${{ inputs.image_name }}
          CI_IMAGE_VER: ${{ vars.CI_IMAGE_VER || '' }}
        run: |
          set -euo pipefail
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${repo_lc}/${CI_IMAGE_NAME}"
          suffix_input="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}"
          suffix_input="$(echo "${suffix_input}" | tr '[:upper:]' '[:lower:]' | xargs)"

          next_tag() {
            local t="$1"
            local major minor patch
            major="${t#v}"; major="${major%%.*}"
            minor="${t#v${major}.}"; minor="${minor%%.*}"
            patch="${t##*.}"
            if (( patch < 99 )); then
              patch=$((patch + 1))
            elif (( minor < 99 )); then
              minor=$((minor + 1))
              patch=0
            elif (( major < 99 )); then
              major=$((major + 1))
              minor=0
              patch=0
            else
              echo "Tag range exhausted at ${t}" >&2
              return 1
            fi
            printf 'v%d.%d.%d\n' "${major}" "${minor}" "${patch}"
          }

          base_numeric_tag="$(sed -E 's/^(v[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{1,2}).*/\1/' <<< "${CI_IMAGE_VER}")"
          if [[ ! "${base_numeric_tag}" =~ ^v[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
            # First run or malformed variable fallback: generate v0.0.1.
            base_numeric_tag="v0.0.0"
          fi

          # Discover latest numeric tag from existing GHCR image versions.
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          package_name="${repo_name}/ci"
          package_name_enc="${package_name//\//%2F}"
          tags_json="$(gh api -H "Accept: application/vnd.github+json" "/users/${owner_lc}/packages/container/${package_name_enc}/versions?per_page=100" 2>/dev/null || echo '[]')"
          latest_registry_numeric_tag="$(
            jq -r '
              [
                .[]?
                | (.metadata.container.tags // [])[]
                | capture("^(?<n>v[0-9]{1,2}\\.[0-9]{1,2}\\.[0-9]{1,2})").n
              ] | unique | .[]
            ' <<< "${tags_json}" 2>/dev/null | sort -V | tail -n1
          )"
          if [[ "${latest_registry_numeric_tag:-}" =~ ^v[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
            highest_numeric_tag="$(printf '%s\n%s\n' "${base_numeric_tag}" "${latest_registry_numeric_tag}" | sort -V | tail -n1)"
          else
            highest_numeric_tag="${base_numeric_tag}"
          fi

          tag="$(next_tag "${highest_numeric_tag}")${suffix_input}"
          tag_sanitized="$(echo "${tag}" | tr '/:@ ' '-' | tr -cd 'a-zA-Z0-9._-')"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag_sanitized}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image}:${tag_sanitized}" >> "${GITHUB_OUTPUT}"
          echo "image_ref_sha=${image}:sha-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          build-contexts: |
            imagefile=docker-image://${{ inputs.base_image }}
          context: .
          file: docker/ci-images/${{ inputs.dockerfile }}
          platforms: ${{ inputs.build_platforms || 'linux/amd64' }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          meta-images: user/app
          meta-tags: |
                type=ref,event=branch
                type=ref,event=pr
                type=semver,pattern={{version}}
                type=semver,pattern={{major}}.{{minor}}

      - name: Push latest/lts tags
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.image }}:latest" \
            -t "${{ steps.meta.outputs.image }}:lts" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}"

      - name: Save image metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > ci-image.env <<EOF
          CI_IMAGE=${{ steps.meta.outputs.image }}
          CI_IMAGE_TAG=${{ steps.meta.outputs.tag }}
          CI_IMAGE_SHA_TAG=${{ steps.meta.outputs.sha_tag }}
          CI_IMAGE_REF=${{ steps.meta.outputs.image_ref }}
          CI_IMAGE_REF_SHA=${{ steps.meta.outputs.image_ref_sha }}
          EOF

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-image-metadata
          path: ci-image.env
          if-no-files-found: error

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### CI image metadata"
            echo
            echo "- image: \`${{ steps.meta.outputs.image }}\`"
            echo "- tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- sha tag: \`${{ steps.meta.outputs.sha_tag }}\`"
            echo "- image ref: \`${{ steps.meta.outputs.image_ref }}\`"
            echo "- image ref sha: \`${{ steps.meta.outputs.image_ref_sha }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Print usage hint
        shell: bash
        run: |
          echo "Use this image in workflows:"
          echo "  ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          echo "  ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}"
          echo "  ${{ steps.meta.outputs.image }}:latest"
          echo "  ${{ steps.meta.outputs.image }}:lts"

  delete-image-tags:
    if: ${{ inputs.operation == 'delete' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Delete requested tags from GHCR package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.amsternl != '' && secrets.amsternl || github.token }}
          DELETE_TAGS: ${{ inputs.delete_tags }}
        run: |
          set -euo pipefail
          if [[ -z "${DELETE_TAGS// }" ]]; then
            echo "delete_tags is empty" >&2
            exit 1
          fi

          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          package_name="${repo_name}/ci"
          package_name_enc="${package_name//\//%2F}"
          tags="$(echo "${DELETE_TAGS}" | tr ',' ' ' | xargs -n1 | sed '/^$/d' | sort -u)"

          versions_json="$(gh api -H "Accept: application/vnd.github+json" "/users/${owner_lc}/packages/container/${package_name_enc}/versions?per_page=100")"
          for tag in ${tags}; do
            ids="$(jq -r --arg t "${tag}" '.[] | select((.metadata.container.tags // []) | index($t)) | .id' <<< "${versions_json}")"
            if [[ -z "${ids}" ]]; then
              echo "Tag not found: ${tag}"
              continue
            fi
            for id in ${ids}; do
              echo "Deleting tag ${tag} via package version id ${id}"
              gh api -X DELETE -H "Accept: application/vnd.github+json" "/users/${owner_lc}/packages/container/${package_name_enc}/versions/${id}"
            done
          done
