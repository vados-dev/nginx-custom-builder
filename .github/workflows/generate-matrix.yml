name: Generate Matrix

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      module_mode:
        description: "How to select modules for matrix targets"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - custom
      custom_modules:
        description: "Space-separated module list when module_mode=custom"
        required: false
        default: ""
        type: string
      show_available_modules:
        description: "Print available modules from debian/list-all-modules"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      module_mode:
        required: false
        default: "auto"
        type: string
      custom_modules:
        required: false
        default: ""
        type: string
      show_available_modules:
        required: false
        default: false
        type: boolean

defaults:
  run:
    shell: "bash -Eeuo pipefail -x {0}"

jobs:
  buildx-smoke:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show Buildx builders
        run: |
          docker buildx version
          docker buildx ls

  generate-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix-alpine: ${{ steps.set-matrix.outputs.matrix-alpine }}
      matrix-ubuntu: ${{ steps.set-matrix.outputs.matrix-ubuntu }}
      matrix-redhat: ${{ steps.set-matrix.outputs.matrix-redhat }}
      selected-modules: ${{ steps.resolve-targets.outputs.selected_modules }}
      targets-alpine: ${{ steps.resolve-targets.outputs.targets_alpine }}
      targets-ubuntu: ${{ steps.resolve-targets.outputs.targets_ubuntu }}
      targets-redhat: ${{ steps.resolve-targets.outputs.targets_redhat }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Resolve module targets
        id: resolve-targets
        run: |
          normalize_modules() {
            local raw="$1"
            if [[ -z "${raw//[[:space:]]/}" ]]; then
              echo ""
              return
            fi
            echo "$raw" | xargs -n1 | awk 'NF && !seen[$0]++' | xargs
          }

          intersection_modules() {
            local selected="$1"
            local available="$2"
            local result=""
            for mod in ${selected}; do
              if grep -qw "${mod}" <<< "${available}"; then
                result="${result} ${mod}"
              fi
            done
            normalize_modules "${result}"
          }

          event_mode="$(jq -r '.inputs.module_mode // empty' "${GITHUB_EVENT_PATH}")"
          event_custom="$(jq -r '.inputs.custom_modules // empty' "${GITHUB_EVENT_PATH}")"
          event_show="$(jq -r '.inputs.show_available_modules // empty' "${GITHUB_EVENT_PATH}")"

          module_mode="${event_mode:-auto}"
          custom_modules="${event_custom:-}"
          show_available="${event_show:-false}"

          debian_modules="$(make --no-print-directory -C debian list-all-modules | awk '{print $1}' | xargs || true)"
          debian_modules="$(normalize_modules "${debian_modules}")"

          alpine_modules="$(make --no-print-directory -C alpine list-all-modules | awk '{print $1}' | xargs || true)"
          alpine_modules="$(normalize_modules "${alpine_modules}")"

          redhat_modules="$(make --no-print-directory -C SPECS list-all-modules | awk '{print $1}' | xargs || true)"
          redhat_modules="$(normalize_modules "${redhat_modules}")"

          ubuntu_modules=""
          for mod in ${debian_modules}; do
            if [[ -f "docs/nginx-module-${mod}.xml" ]]; then
              ubuntu_modules="${ubuntu_modules} ${mod}"
            fi
          done
          ubuntu_modules="$(normalize_modules "${ubuntu_modules}")"

          all_modules="$(normalize_modules "${debian_modules} ${alpine_modules} ${redhat_modules}")"

          if [[ -z "${all_modules}" ]]; then
            echo "No modules discovered across debian/alpine/redhat" >&2
            exit 1
          fi

          if [[ "${show_available}" == "true" ]]; then
            echo "Available modules (global): ${all_modules}"
            echo "Available modules (ubuntu docs-backed): ${ubuntu_modules}"
            echo "Available modules (alpine): ${alpine_modules}"
            echo "Available modules (redhat): ${redhat_modules}"
          fi

          selected_modules=""
          case "${module_mode}" in
            auto)
              selected_modules="${all_modules}"
              ;;
            custom)
              selected_modules="$(normalize_modules "${custom_modules}")"
              if [[ -z "${selected_modules}" ]]; then
                echo "module_mode=custom requires non-empty custom_modules" >&2
                exit 1
              fi
              invalid_modules=""
              for mod in ${selected_modules}; do
                if ! grep -qw "${mod}" <<< "${all_modules}"; then
                  invalid_modules="${invalid_modules} ${mod}"
                fi
              done
              if [[ -n "${invalid_modules//[[:space:]]/}" ]]; then
                echo "Unknown modules requested:${invalid_modules}" >&2
                echo "Available modules: ${all_modules}" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported module_mode: ${module_mode}" >&2
              exit 1
              ;;
          esac

          selected_alpine="$(intersection_modules "${selected_modules}" "${alpine_modules}")"
          selected_ubuntu="$(intersection_modules "${selected_modules}" "${ubuntu_modules}")"
          selected_redhat="$(intersection_modules "${selected_modules}" "${redhat_modules}")"

          targets_alpine="base"
          for mod in ${selected_alpine}; do
            targets_alpine="${targets_alpine} module-${mod}"
          done

          targets_ubuntu="base"
          for mod in ${selected_ubuntu}; do
            targets_ubuntu="${targets_ubuntu} module-${mod}"
          done

          targets_redhat="base"
          for mod in ${selected_redhat}; do
            targets_redhat="${targets_redhat} module-${mod}"
          done

          targets_alpine="$(normalize_modules "${targets_alpine}")"
          targets_ubuntu="$(normalize_modules "${targets_ubuntu}")"
          targets_redhat="$(normalize_modules "${targets_redhat}")"

          echo "selected_modules=${selected_modules}" >> "${GITHUB_OUTPUT}"
          echo "targets_alpine=${targets_alpine}" >> "${GITHUB_OUTPUT}"
          echo "targets_ubuntu=${targets_ubuntu}" >> "${GITHUB_OUTPUT}"
          echo "targets_redhat=${targets_redhat}" >> "${GITHUB_OUTPUT}"
          echo "Resolved matrix targets (alpine): ${targets_alpine}"
          echo "Resolved matrix targets (ubuntu): ${targets_ubuntu}"
          echo "Resolved matrix targets (redhat): ${targets_redhat}"

      - name: Set matrix
        id: set-matrix
        env:
          TARGETS_ALPINE: ${{ steps.resolve-targets.outputs.targets_alpine }}
          TARGETS_UBUNTU: ${{ steps.resolve-targets.outputs.targets_ubuntu }}
          TARGETS_REDHAT: ${{ steps.resolve-targets.outputs.targets_redhat }}
        run: |
          jq -nRr '"matrix-alpine=" + ({ include: [ $ARGS.positional[] | {target: .} ] } | tojson)' --args ${TARGETS_ALPINE} >> "${GITHUB_OUTPUT}"
          jq -nRr '"matrix-ubuntu=" + ({ include: [ $ARGS.positional[] | {target: .} ] } | tojson)' --args ${TARGETS_UBUNTU} >> "${GITHUB_OUTPUT}"
          jq -nRr '"matrix-redhat=" + ({ include: [ $ARGS.positional[] | {target: .} ] } | tojson)' --args ${TARGETS_REDHAT} >> "${GITHUB_OUTPUT}"

  alpine:
    needs: generate-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix-alpine)}}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Alpine Linux
        uses: jirutka/setup-alpine@ae3b3ddba35054804fc4a3507b519fa7e8152050 # v1
        with:
          branch: v3.20
          packages: >
            abuild
            build-base
            coreutils
            curl
            findutils
            git
            make
            rustup
            xz

      - name: Install Rust toolchain
        shell: alpine.sh {0}
        run: rustup-init --default-toolchain 1.86.0 --profile minimal -y

      - name: Create build depends
        shell: alpine.sh {0}
        working-directory: alpine
        run: |
          make abuild-${{ matrix.target }}

      - name: Install build depends
        shell: alpine.sh --root {0}
        working-directory: alpine
        run: |
          apk add $(. ./abuild-${{ matrix.target }}/APKBUILD; echo $makedepends;)

      - name: Build ${{ matrix.target }}
        shell: alpine.sh {0}
        working-directory: alpine
        run: |
          make ${{ matrix.target }}

      - name: List what has been built
        shell: alpine.sh {0}
        if: ${{ !cancelled() }}
        run: |
          find ~/packages/alpine -type f | xargs ls -ld

  ubuntu:
    needs: generate-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix-ubuntu)}}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-suggests --no-install-recommends \
            curl \
            devscripts \
            equivs \
            git \
            libxml2-utils \
            lsb-release \
            xsltproc

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          toolchain: 1.86.0

      - name: Create and install build depends for ${{ matrix.target }} and build it
        working-directory: debian
        run: |
          NGINX_VERSION=$(make --eval 'nv:; @echo $(BASE_VERSION)' nv)
          make rules-${{ matrix.target }}
          sudo mk-build-deps --install --tool="apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes" \
            debuild-${{ matrix.target }}/nginx-${NGINX_VERSION}/debian/control
          make ${{ matrix.target }}

      - name: List what has been built
        if: ${{ !cancelled() }}
        run: |
          find .. -mindepth 1 -maxdepth 1 -name "*.deb" | xargs ls -ld

  redhat:
    needs: generate-matrix
    runs-on: ubuntu-24.04
    container: almalinux:9
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix-redhat)}}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup AlmaLinux
        run: |
          dnf makecache
          dnf install -y \
            g++ \
            gcc \
            git \
            epel-release \
            libxslt \
            make \
            rpm-build \
            which \
            wget \
            xz \
            'dnf-command(config-manager)'
          dnf config-manager --set-enabled crb

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          toolchain: 1.86.0

      - name: Create and install build depends for ${{ matrix.target }} and build it
        working-directory: SPECS
        run: |
          case ${{ matrix.target }} in
            base)
              spec="nginx.spec"
              ;;
            *)
              spec="nginx-${{ matrix.target }}.spec"
              ;;
          esac
          make "${spec}"
          dnf -y builddep "./${spec}"
          make "${{ matrix.target }}"

      - name: List what has been built
        if: ${{ !cancelled() }}
        run: |
          find "$HOME/rpmbuild/RPMS" -type f -print0 | xargs -0r ls -ld
