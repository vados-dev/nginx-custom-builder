name: Build Custom Alpine APK

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: true
        default: "mainline"
        type: choice
        options:
          - stable
          - mainline
      alpine_version:
        description: "Alpine major.minor, e.g. 3.20"
        required: true
        default: "3.20"
        type: string
      enabled_modules:
        description: "Space-separated module list override for APK build"
        required: true
        default: "error-page-inherit include-server markdown-filter"
        type: string
      publish_alpine_repo:
        description: "Publish APK repository to gh-pages"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: false
        default: "mainline"
        type: string
      alpine_version:
        description: "Alpine major.minor, e.g. 3.20"
        required: false
        default: "3.20"
        type: string
      enabled_modules:
        description: "Space-separated module list override for APK build"
        required: false
        default: "error-page-inherit include-server markdown-filter"
        type: string
      publish_alpine_repo:
        description: "Publish APK repository to gh-pages"
        required: false
        default: true
        type: boolean

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.repository.owner.id == github.event.sender.id }}
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.amsternl != '' && secrets.amsternl || github.token }}
    container: alpine:${{ inputs.alpine_version }}

    steps:
#      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: Install build dependencies
        shell: sh
        run: |
          set -eux
          apk add --no-cache \
            bash \
            build-base \
            git \
            mercurial \
            curl \
            wget \
            tar \
            xz \
            openssl \
            abuild \
            alpine-sdk \
            linux-headers \
            pcre2-dev \
            pcre-dev \
            zlib-dev \
            openssl-dev \
            libxslt-dev \
            perl-dev \
            gd-dev \
            cmark-dev \
            clang \
            clang-libclang \
            pkgconf \
            coreutils \
            findutils \
            make \
            rustup

      - name: Resolve libclang path
        shell: sh
        run: |
          set -eu
          libclang_path="$(find /usr/lib -type f -name 'libclang.so*' | head -n1 || true)"
          if [ -z "${libclang_path}" ]; then
            echo "Unable to find libclang shared library under /usr/lib" >&2
            exit 1
          fi
          echo "LIBCLANG_PATH=$(dirname "${libclang_path}")" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare contrib directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p contrib/tarballs

      - name: Resolve nginx version for channel
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ inputs.nginx_channel }}"
          version_string="$(curl -fsSL "https://version.nginx.com/nginx/${channel}")"
          nginx_version="${version_string%%-*}"
          if [[ -z "${nginx_version}" ]]; then
            echo "Failed to resolve nginx version for channel: ${channel}" >&2
            exit 1
          fi
          sed -i -E "s/^NGINX_VERSION[[:space:]]*:=.*/NGINX_VERSION := ${nginx_version}/" contrib/src/nginx/version
          echo "nginx_version=${nginx_version}" >> "${GITHUB_OUTPUT}"
          echo "NGINX_VERSION=${nginx_version}" >> "${GITHUB_ENV}"

      - name: Prepare non-root builder
        shell: bash
        run: |
          set -euo pipefail
          adduser -D -h /home/builder builder || true
          chown -R builder:builder /home/builder "${GITHUB_WORKSPACE}" /github/home

      - name: Install modern Rust toolchain for builder
        shell: bash
        run: |
          set -euo pipefail
          su builder -s /bin/bash -c '
            set -euo pipefail
            curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
            /home/builder/.cargo/bin/rustc --version
            /home/builder/.cargo/bin/cargo --version
          '

      - name: Build Alpine module packages
        shell: bash
        run: |
          set -euo pipefail
          modules="${{ inputs.enabled_modules }}"
          if [[ -n "${modules}" ]]; then
            su builder -s /bin/bash -c "export PATH=\"/home/builder/.cargo/bin:\$PATH\"; export LIBCLANG_PATH=\"${LIBCLANG_PATH}\"; cd \"${GITHUB_WORKSPACE}\" && make -C alpine modules ENABLED_MODULES='${modules}'"
          else
            su builder -s /bin/bash -c "export PATH=\"/home/builder/.cargo/bin:\$PATH\"; export LIBCLANG_PATH=\"${LIBCLANG_PATH}\"; cd \"${GITHUB_WORKSPACE}\" && make -C alpine modules"
          fi

      - name: Collect APK artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/apk-build-artifacts
          find /home/builder/packages -type f -name '*.apk' -exec cp -f {} /tmp/apk-build-artifacts/ \;
          if ! compgen -G '/tmp/apk-build-artifacts/*.apk' > /dev/null; then
            echo "No APK artifacts produced" >&2
            exit 1
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages-${{ inputs.nginx_channel }}
          path: /tmp/apk-build-artifacts/*.apk

      - name: Build APK repository metadata
        if: ${{ inputs.publish_alpine_repo }}
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ inputs.nginx_channel }}"
          alpine_v="v${{ inputs.alpine_version }}"
          arch="$(apk --print-arch)"
          repo_root="/tmp/apk-repo/repo/alpine/${alpine_v}/${channel}/${arch}"

          mkdir -p "${repo_root}"
          cp -f /tmp/apk-build-artifacts/*.apk "${repo_root}/"

          (
            cd "${repo_root}"
            apk index --allow-untrusted --rewrite-arch "${arch}" -o APKINDEX.tar.gz ./*.apk
          )

          mkdir -p /tmp/apk-repo/repo/alpine/keys
          if [[ -f "/home/builder/.abuild/abuild-key.rsa.pub" ]]; then
            cp -f /home/builder/.abuild/abuild-key.rsa.pub /tmp/apk-repo/repo/alpine/keys/
          fi

      - name: Publish APK repository to gh-pages
        if: ${{ inputs.publish_alpine_repo }}
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GITHUB token is empty, skip APK publish."
            exit 0
          fi

          channel="${{ inputs.nginx_channel }}"
          alpine_v="v${{ inputs.alpine_version }}"
          publish_root="/tmp/gh-pages-publish"
          source_root="/tmp/apk-repo/repo/alpine/${alpine_v}/${channel}"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"

          rm -rf "${publish_root}"
          mkdir -p "${publish_root}"
          cd "${publish_root}"

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "${remote_url}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth 1 origin gh-pages
            git reset --hard FETCH_HEAD
          fi

          mkdir -p "repo/alpine/${alpine_v}"
          rm -rf "repo/alpine/${alpine_v}/${channel}"
          cp -a "${source_root}" "repo/alpine/${alpine_v}/${channel}"
          mkdir -p "repo/alpine/keys"
          if compgen -G '/tmp/apk-repo/repo/alpine/keys/*.pub' > /dev/null; then
            cp -f /tmp/apk-repo/repo/alpine/keys/*.pub "repo/alpine/keys/"
          fi

          {
            echo "Custom Alpine APK repository"
            echo "Channels: stable, mainline"
            echo "Path pattern: repo/alpine/${alpine_v}/<channel>/<arch>/"
          } > "repo/alpine/${alpine_v}/README.txt"

          git add repo/alpine
          if git diff --cached --quiet; then
            echo "No APK repo changes to publish."
            exit 0
          fi

          git commit -m "repo: publish custom alpine ${alpine_v}/${channel} nginx ${NGINX_VERSION} (run ${GITHUB_RUN_ID})"
          git push origin gh-pages

  publish-pages-index:
    if: ${{ inputs.publish_alpine_repo }}
    needs: build
    uses: ./.github/workflows/publish-pages-index.yml
    secrets: inherit
