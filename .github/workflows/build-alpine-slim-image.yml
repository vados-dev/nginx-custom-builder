name: Build Alpine Slim Image

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: true
        default: "mainline"
        type: choice
        options:
          - stable
          - mainline
      base_image:
        description: "Pinned or floating official nginx alpine-slim tag"
        required: false
        default: ""
        type: string
      alpine_version:
        description: "Alpine version label used for tags/metadata"
        required: false
        default: "3.20"
        type: string
      nginx_version:
        description: "Optional nginx version used for image tag derivation"
        required: false
        default: ""
        type: string
      apk_artifact_name:
        description: "Optional artifact name from the same workflow run with built APK files"
        required: false
        default: ""
        type: string
      alpine_repo_url:
        description: "APK repository URL with custom modules"
        required: false
        default: ""
        type: string
      alpine_key_url:
        description: "Optional public signing key URL for the APK repo"
        required: false
        default: ""
        type: string
      enabled_modules:
        description: "Space-separated APK package names to install"
        required: true
        default: "nginx-module-markdown-filter nginx-module-error-page-inherit nginx-module-include-server"
        type: string
      image_name:
        description: "Target image name without tag (empty = ghcr.io/<repo>/nginx-alpine-slim)"
        required: false
        default: ""
        type: string
      image_tag:
        description: "Primary target image tag (empty = auto)"
        required: false
        default: ""
        type: string
      push_image:
        description: "Push built image to registry"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: false
        default: "mainline"
        type: string
      base_image:
        description: "Pinned or floating official nginx alpine-slim tag"
        required: false
        default: ""
        type: string
      alpine_version:
        description: "Alpine version label used for tags/metadata"
        required: false
        default: "3.20"
        type: string
      nginx_version:
        description: "Optional nginx version used for image tag derivation"
        required: false
        default: ""
        type: string
      apk_artifact_name:
        description: "Optional artifact name from the same workflow run with built APK files"
        required: false
        default: ""
        type: string
      alpine_repo_url:
        description: "APK repository URL with custom modules"
        required: false
        default: ""
        type: string
      alpine_key_url:
        description: "Optional public signing key URL for the APK repo"
        required: false
        default: ""
        type: string
      enabled_modules:
        description: "Space-separated APK package names to install"
        required: false
        default: "nginx-module-markdown-filter nginx-module-error-page-inherit nginx-module-include-server"
        type: string
      image_name:
        description: "Target image name without tag (empty = ghcr.io/<repo>/nginx-alpine-slim)"
        required: false
        default: ""
        type: string
      image_tag:
        description: "Primary target image tag (empty = auto)"
        required: false
        default: ""
        type: string
      push_image:
        description: "Push built image to registry"
        required: false
        default: true
        type: boolean
    outputs:
      image_ref:
        description: "Primary image reference"
        value: ${{ jobs.build.outputs.image_ref }}
      image_tags:
        description: "All generated image tags"
        value: ${{ jobs.build.outputs.image_tags }}

jobs:
  build:
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    runs-on: ubuntu-24.04
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tags: ${{ steps.meta.outputs.tags_csv }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Docker build context
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/alpine-slim-context
          mkdir -p /tmp/alpine-slim-context/apk-packages
          cp docker/alpine-slim/Dockerfile /tmp/alpine-slim-context/Dockerfile

      - name: Download APK artifact
        if: ${{ inputs.apk_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.apk_artifact_name }}
          path: /tmp/alpine-slim-context/apk-packages

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          if [[ -n "${{ inputs.image_name }}" ]]; then
            image_name="${{ inputs.image_name }}"
          else
            image_name="ghcr.io/${repo_lc}/nginx-alpine-slim"
          fi

          nginx_channel="${{ inputs.nginx_channel }}"
          alpine_version="${{ inputs.alpine_version }}"
          nginx_version="${{ inputs.nginx_version }}"
          if [[ -z "${nginx_version}" ]]; then
            version_string="$(curl -fsSL "https://version.nginx.com/nginx/${nginx_channel}")"
            nginx_version="${version_string%%-*}"
          fi
          base_image="${{ inputs.base_image }}"
          if [[ -z "${base_image}" ]]; then
            if [[ -n "${nginx_version}" ]]; then
              base_image="nginx:${nginx_version}-alpine-slim"
            else
              base_image="nginx:${nginx_channel}-alpine-slim"
            fi
          fi

          image_tag="${{ inputs.image_tag }}"
          if [[ -z "${image_tag}" ]]; then
            if [[ -n "${nginx_version}" ]]; then
              image_tag="${nginx_channel}-${nginx_version}-alpine${alpine_version}-slim"
            else
              image_tag="${nginx_channel}-alpine${alpine_version}-slim"
            fi
          fi

          tags=("${image_name}:${image_tag}")
          if [[ -n "${alpine_version}" ]]; then
            tags+=("${image_name}:${nginx_channel}-alpine${alpine_version}-slim")
          fi
          tags+=("${image_name}:${nginx_channel}-alpine-slim")
          if [[ -n "${nginx_version}" ]]; then
            tags+=("${image_name}:${nginx_version}-alpine${alpine_version}-slim")
          fi

          mapfile -t uniq_tags < <(printf '%s\n' "${tags[@]}" | awk '!seen[$0]++')

          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_name}:${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "base_image=${base_image}" >> "${GITHUB_OUTPUT}"
          printf 'tags<<EOF\n%s\nEOF\n' "$(printf '%s\n' "${uniq_tags[@]}")" >> "${GITHUB_OUTPUT}"
          echo "tags_csv=$(IFS=,; echo "${uniq_tags[*]}")" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build alpine-slim image
        uses: docker/build-push-action@v7
        with:
          context: /tmp/alpine-slim-context
          file: /tmp/alpine-slim-context/Dockerfile
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BASE_IMAGE=${{ steps.meta.outputs.base_image }}
            APK_REPO_URL=${{ inputs.alpine_repo_url }}
            APK_KEY_URL=${{ inputs.alpine_key_url }}
            ENABLED_MODULES=${{ inputs.enabled_modules }}

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### Alpine slim image"
            echo
            echo "- image: \`${{ steps.meta.outputs.image_ref }}\`"
            echo "- base image: \`${{ steps.meta.outputs.base_image }}\`"
            echo "- apk artifact: \`${{ inputs.apk_artifact_name }}\`"
            echo "- apk repo: \`${{ inputs.alpine_repo_url }}\`"
            echo "- modules: \`${{ inputs.enabled_modules }}\`"
            echo
            echo "The workflow installs custom APK packages into an official \`nginx:*-alpine-slim\` image."
            echo "When recognized custom module packages are present, it also generates \`load_module\` config under \`/etc/nginx/modules/*.conf\`."
          } >> "${GITHUB_STEP_SUMMARY}"
