name: Build RPM

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: true
        default: "mainline"
        type: choice
        options:
          - stable
          - mainline
      build_args:
        description: "rpmbuild arguments"
        required: true
        default: '-bb'
        type: choice
        options:
          - '-bb'
          - '-ba'
      disable_debug_packages:
        description: "Disable debug/debuginfo packages"
        required: true
        default: true
        type: boolean
      enabled_modules:
        description: "Space-separated module list override for RPM build"
        required: false
        default: "acme error-page-inherit include-server markdown-filter njs"
        type: string
      publish_dnf_repo:
        description: "Publish DNF repository to gh-pages"
        required: true
        default: true
        type: boolean
      rpm_repo_os:
        description: "DNF repo OS path segment override (empty = auto-detect)"
        required: false
        default: ""
        type: string
      rpm_repo_release:
        description: "DNF repo release path segment override (empty = auto-detect)"
        required: false
        default: ""
        type: string
      alpine_version:
        description: "Alpine major.minor for apk repo layout, e.g. 3.20"
        required: true
        default: ""
        type: string
      publish_alpine_structure:
        description: "Publish Alpine repo directory structure to gh-pages"
        required: true
        default: true
        type: boolean
      release_tag:
        description: "Optional release tag (must start with v, e.g. v0.0.1)"
        required: false
        default: ""
        type: string
      ci_container_image:
        description: "CI container tag for RPM build job"
        required: false
        default: "lts"
        type: string
  workflow_call:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: false
        default: "mainline"
        type: string
      build_args:
        description: "rpmbuild arguments"
        required: false
        default: "-bb"
        type: string
      disable_debug_packages:
        description: "Disable debug/debuginfo packages"
        required: false
        default: true
        type: boolean
      enabled_modules:
        description: "Space-separated module list override for RPM build"
        required: false
        default: "acme njs error-page-inherit include-server markdown-filter"
        type: string
      publish_dnf_repo:
        description: "Publish DNF repository to gh-pages"
        required: false
        default: true
        type: boolean
      rpm_repo_os:
        description: "DNF repo OS path segment override (empty = auto-detect)"
        required: false
        default: ""
        type: string
      rpm_repo_release:
        description: "DNF repo release path segment override (empty = auto-detect)"
        required: false
        default: "10"
        type: string
      alpine_version:
        description: "Alpine major.minor for apk repo layout, e.g. 3.20"
        required: false
        default: "3.20"
        type: string
      publish_alpine_structure:
        description: "Publish Alpine repo directory structure to gh-pages"
        required: false
        default: true
        type: boolean
      release_tag:
        description: "Optional release tag (must start with v, e.g. v0.0.1)"
        required: false
        default: ""
        type: string
      ci_container_image:
        description: "CI container tag for RPM build job"
        required: false
        default: "lts"
        type: string

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.repository.owner.id == github.event.sender.id }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.amsternl != '' && secrets.amsternl || github.token }}
      RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
    container: ${{ format('ghcr.io/vados-dev/nginx-custom-builder/ci:{0}', inputs.ci_container_image) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare sources from nginx SRPM
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          channel="${{ inputs.nginx_channel }}"
          source_repo="nginx-mainline-source"
          if [[ "$channel" == "stable" ]]; then
            source_repo="nginx-source"
          fi

          source /etc/os-release
          os_token="${ID}"
          case "${os_token}" in
            almalinux|rocky|rhel|ol|oraclelinux)
              os_token="centos"
              ;;
          esac
          release_token="${VERSION_ID%%.*}"
          repo_file="/tmp/nginx.repo"

          cp SOURCES/nginx.repo "$repo_file"
          sed -i \
            -e "s|OS|${os_token}|g" \
            -e "s|RELEASEVER|${release_token}|g" \
            "$repo_file"
          sed -i -E 's/^enabled=1$/enabled=0/' "$repo_file"
          sed -i -E "/^\[$source_repo\]/,/^\[/{s/^enabled=.*/enabled=1/}" "$repo_file"
          cp "$repo_file" /etc/yum.repos.d/nginx.repo

          dnf -y --disablerepo="*" --enablerepo="$source_repo" download --source nginx
          src_rpm="$(ls -1t nginx-*.src.rpm | head -n 1)"
          ver="$(rpm -qp --queryformat '%{VERSION}\n' "$src_rpm")"
          echo "NGINX_VERSION=${ver}" >> "$GITHUB_ENV"
          rm -rf /tmp/nginx-srpm
          mkdir -p /tmp/nginx-srpm
          pushd /tmp/nginx-srpm >/dev/null
          rpm2cpio "$GITHUB_WORKSPACE/$src_rpm" | cpio -idmv
          tarball="$(ls -1 nginx-${ver}.tar.* | head -n 1)"
          popd >/dev/null

          rm -f SOURCES/nginx-*.tar.gz SOURCES/nginx-*.tar.xz SOURCES/nginx-*.tgz
          cp -f "/tmp/nginx-srpm/${tarball}" "SOURCES/${tarball}"

          sed -i -E "s/^NGINX_VERSION[[:space:]]*:=.*/NGINX_VERSION := ${ver}/" contrib/src/nginx/version
          enabled_modules="${{ inputs.enabled_modules }}"
          if [[ -n "${enabled_modules}" ]]; then
            for mod in ${enabled_modules}; do
              make -C SPECS --no-print-directory ".deps-module-${mod}"
            done
          fi
          if [[ -n "${enabled_modules}" ]]; then
            make -C SPECS nginx.spec specs ENABLED_MODULES="${enabled_modules}"
          else
            make -C SPECS nginx.spec specs
          fi

          echo "Generated module specs:"
          shopt -s nullglob
          module_specs=(SPECS/nginx-module-*.spec)
          printf '%s\n' "${module_specs[@]:-}"
          if [[ -n "${enabled_modules}" && "${#module_specs[@]}" -eq 0 ]]; then
            echo "No module specs were generated for enabled_modules='${enabled_modules}'" >&2
            exit 1
          fi

          echo "nginx_version=${ver}" >> "$GITHUB_OUTPUT"
          echo "source_repo=${source_repo}" >> "$GITHUB_OUTPUT"
          echo "source_rpm=${src_rpm}" >> "$GITHUB_OUTPUT"
          echo "source_tarball=${tarball}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Get env variables
        shell: bash
        run: |
          set -euo pipefail
          echo "DT_STAMP=$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "DateTime=$(date +%d.%m.%Y-%T)" >> "$GITHUB_ENV"
          echo "REF=${{ github.ref }}" >> "$GITHUB_ENV"
          echo "REF_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "GITHUB_RUN_ID=${{ github.run_id }}" >> "$GITHUB_ENV"
          echo "SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "NGINX_VERSION=${{ steps.prepare.outputs.nginx_version }}" >> "$GITHUB_ENV"
          echo "SOURCE_REPO=${{ steps.prepare.outputs.source_repo }}" >> "$GITHUB_ENV"
          echo "SOURCE_RPM=${{ steps.prepare.outputs.source_rpm }}" >> "$GITHUB_ENV"
          echo "SOURCE_TARBALL=${{ steps.prepare.outputs.source_tarball }}" >> "$GITHUB_ENV"
          requested_tag='${{ inputs.release_tag }}'

          calc_next_tag() {
            local prev="$1"
            local major minor patch
            if [[ ! "${prev}" =~ ^v([0-9]{1,2})\.([0-9]{1,2})\.([0-9]{1,2})$ ]]; then
              echo "Invalid previous release tag format: ${prev}" >&2
              return 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            patch=$((10#${patch} + 1))
            if (( patch > 99 )); then
              patch=0
              minor=$((10#${minor} + 1))
            fi
            if (( minor > 99 )); then
              minor=0
              major=$((10#${major} + 1))
            fi
            if (( major > 99 )); then
              echo "release_tag overflow: v99.99.99 is the maximum supported tag" >&2
              return 1
            fi
            printf 'v%d.%d.%d\n' "${major}" "${minor}" "${patch}"
          }

          detect_previous_release_tag() {
            local remote_url latest
            remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            latest="$(
              git ls-remote --refs --tags "${remote_url}" \
                | awk -F/ '{print $NF}' \
                | grep -E '^v([0-9]{1,2})\.([0-9]{1,2})\.([0-9]{1,2})$' \
                | sort -t. -k1.2,1n -k2,2n -k3,3n \
                | tail -n1
            )"
            if [[ -n "${latest}" ]]; then
              printf '%s\n' "${latest}"
            fi
          }

          suffix_input=""
          explicit_tag=""
          if [[ -n "${requested_tag}" ]]; then
            if [[ "${requested_tag}" =~ ^v([0-9]{1,2})\.([0-9]{1,2})\.([0-9]{1,2})([a-z])?$ ]]; then
              explicit_tag="${requested_tag}"
            elif [[ "${requested_tag}" =~ ^[a-z]$ ]]; then
              suffix_input="${requested_tag}"
            else
              echo "Invalid release_tag: ${requested_tag}" >&2
              echo "Expected: full tag vX.Y.Z[letter] or single suffix letter (e.g. b)" >&2
              exit 1
            fi
          fi

          if [[ -n "${explicit_tag}" ]]; then
            if [[ "${explicit_tag}" =~ ^(main|master|develop|dev)$ ]]; then
              echo "Ref-like tag names are forbidden: ${explicit_tag}" >&2
              exit 1
            fi
            echo "RELEASE_TAG=${explicit_tag}" >> "$GITHUB_ENV"
          else
            previous_tag="$(detect_previous_release_tag || true)"
            if [[ -n "${previous_tag}" ]]; then
              next_tag="$(calc_next_tag "${previous_tag}")"
              echo "RELEASE_TAG=${next_tag}${suffix_input}" >> "$GITHUB_ENV"
              echo "PREVIOUS_RELEASE_TAG=${previous_tag}" >> "$GITHUB_ENV"
            else
              echo "RELEASE_TAG=v0.0.1${suffix_input}" >> "$GITHUB_ENV"
            fi
          fi

      - name: Build RPM
        id: rpm_build
        shell: bash
        run: |
          set -euo pipefail

          rpmbuild_args=( ${{ inputs.build_args }} --define "_topdir $(pwd)" )
          if [[ "${{ inputs.disable_debug_packages }}" == "true" ]]; then
            rpmbuild_args+=( --define "debug_package %{nil}" --define "_debugsource_packages 0" )
          fi

          # Build base nginx package first.
          rpmbuild "${rpmbuild_args[@]}" SPECS/nginx.spec

          # Build dynamic module packages generated by `make -C SPECS ... specs`.
          shopt -s nullglob
          module_specs=(SPECS/nginx-module-*.spec)
          if [[ -n "${{ inputs.enabled_modules }}" && "${#module_specs[@]}" -eq 0 ]]; then
            echo "No module specs were generated for enabled_modules='${{ inputs.enabled_modules }}'" >&2
            exit 1
          fi
          for spec in "${module_specs[@]}"; do
            rpmbuild "${rpmbuild_args[@]}" "$spec"
          done

      - name: Import GPG key
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ env.RPM_GPG_PRIVATE_KEY }}
        continue-on-error: true

      - name: Sign RPM packages
        if: ${{ steps.import_gpg.outcome == 'success' }}
        shell: bash
        env:
          RPM_GPG_KEYID: ${{ steps.import_gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail
          export GPG_TTY="${GPG_TTY:-$(tty 2>/dev/null || true)}"
          if [ -n "${RPM_GPG_PASSPHRASE:-}" ]; then
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${RPM_GPG_KEYID}
          %_gpg_path %{getenv:HOME}/.gnupg
          %_gpgbin /usr/bin/gpg
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} --batch --yes --pinentry-mode loopback --passphrase '${RPM_GPG_PASSPHRASE}' --no-armor --local-user "%{_gpg_name}" --detach-sign --output %{__signature_filename} %{__plaintext_filename}
          EOF
          else
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${RPM_GPG_KEYID}
          %_gpg_path %{getenv:HOME}/.gnupg
          %_gpgbin /usr/bin/gpg
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} --batch --yes --no-armor --local-user "%{_gpg_name}" --detach-sign --output %{__signature_filename} %{__plaintext_filename}
          EOF
          fi

          echo "Using GPG key: ${RPM_GPG_KEYID}"
          gpg --list-secret-keys --keyid-format LONG
          find RPMS SRPMS -type f -name '*.rpm' -print0 | xargs -0 -r rpmsign --addsign
        continue-on-error: true

      - name: Verify RPM signatures
        if: ${{ steps.import_gpg.outcome == 'success' }}
        shell: bash
        env:
          RPM_GPG_KEYID: ${{ steps.import_gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail
          if [[ -f "SOURCES/RPM-GPG-KEY-nginx" ]]; then
            rpm --import "SOURCES/RPM-GPG-KEY-nginx"
          else
            gpg --batch --yes --armor --export "${RPM_GPG_KEYID}" > /tmp/RPM-GPG-KEY-build
            rpm --import /tmp/RPM-GPG-KEY-build
          fi

          if [[ "${{ inputs.build_args }}" == "-ba" ]]; then
            rpm -Kv RPMS/x86_64/*.rpm SRPMS/*.src.rpm
          else
            rpm -Kv RPMS/x86_64/*.rpm 
          fi
        continue-on-error: true

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        with:
          files: |
            RPMS/**/*.rpm
            SRPMS/*.src.rpm
          name: "Build custom: ${{ env.RELEASE_TAG }} nginx ${{ env.NGINX_VERSION }} (${{ inputs.nginx_channel }})"
          tag_name: ${{ env.RELEASE_TAG }}
          body: |
            Build info:
            - Date: ${{ env.DateTime }}
            - Run ID: ${{ env.GITHUB_RUN_ID }}
            - Ref: ${{ env.REF }}
            - Ref name: ${{ env.REF_NAME }}
            - SHA: ${{ env.SHA }}
            - nginx channel: ${{ inputs.nginx_channel }}
            - source repo: ${{ env.SOURCE_REPO }}
            - source rpm: ${{ env.SOURCE_RPM }}
            - source tarball: ${{ env.SOURCE_TARBALL }}
            - release tag: ${{ env.RELEASE_TAG }}
            - nginx version: ${{ env.NGINX_VERSION }}
            - rpmbuild arguments: ${{ inputs.build_args }}
            - debug packages disabled: ${{ inputs.disable_debug_packages }}
            - enabled modules: ${{ inputs.enabled_modules }}
        continue-on-error: true

      - name: Build DNF repository metadata
        if: ${{ inputs.publish_dnf_repo }}
        shell: bash
        run: |
          set -euo pipefail
          source /etc/os-release
          os_token="${ID}"
          case "${os_token}" in
            almalinux|rocky|rhel|ol|oraclelinux)
              os_token="centos"
              ;;
          esac
          release_token="${VERSION_ID%%.*}"
          repo_os_override="${{ inputs.rpm_repo_os }}"
          repo_release_override="${{ inputs.rpm_repo_release }}"
          if [[ -n "${repo_os_override}" ]]; then
            os_token="${repo_os_override}"
          fi
          if [[ -n "${repo_release_override}" ]]; then
            release_token="${repo_release_override}"
          fi
          arch_token="$(uname -m)"
          channel="${{ inputs.nginx_channel }}"

          # Legacy flat layout (kept for backward compatibility)
          legacy_root="/tmp/dnf-repo/repo/${channel}"
          mkdir -p "${legacy_root}/${arch_token}" "${legacy_root}/SRPMS"
          cp -f RPMS/"${arch_token}"/*.rpm "${legacy_root}/${arch_token}/"
          if compgen -G "SRPMS/*.src.rpm" > /dev/null; then
            cp -f SRPMS/*.src.rpm "${legacy_root}/SRPMS/"
          fi
          createrepo_c --update "${legacy_root}/${arch_token}"
          if compgen -G "${legacy_root}/SRPMS/*.src.rpm" > /dev/null; then
            createrepo_c --update "${legacy_root}/SRPMS"
          fi
          printf '%s\n' "${NGINX_VERSION}" > "${legacy_root}/VERSION"

          # Structured layout with releasever/basearch support:
          # repo/<os>/<release>/<channel>/<arch>/ and .../SRPMS/
          structured_root="/tmp/dnf-repo/repo/${os_token}/${release_token}/${channel}"
          mkdir -p "${structured_root}/${arch_token}" "${structured_root}/SRPMS"
          cp -f RPMS/"${arch_token}"/*.rpm "${structured_root}/${arch_token}/"
          if compgen -G "SRPMS/*.src.rpm" > /dev/null; then
            cp -f SRPMS/*.src.rpm "${structured_root}/SRPMS/"
          fi
          createrepo_c --update "${structured_root}/${arch_token}"
          if compgen -G "${structured_root}/SRPMS/*.src.rpm" > /dev/null; then
            createrepo_c --update "${structured_root}/SRPMS"
          fi
          printf '%s\n' "${NGINX_VERSION}" > "${structured_root}/VERSION"
          printf '%s\n' "${os_token}" > /tmp/dnf-repo/OS_TOKEN
          printf '%s\n' "${release_token}" > /tmp/dnf-repo/RELEASE_TOKEN
          printf '%s\n' "${arch_token}" > /tmp/dnf-repo/ARCH_TOKEN

      - name: Publish DNF repository to gh-pages
        if: ${{ inputs.publish_dnf_repo }}
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GITHUB token is empty, skip DNF publish."
            exit 0
          fi

          publish_root="/tmp/gh-pages-publish"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          channel="${{ inputs.nginx_channel }}"
          source_root="/tmp/dnf-repo/repo"
          source_root="/tmp/dnf-repo/repo"
          source_root="/tmp/dnf-repo/repo"
          os_token="$(cat /tmp/dnf-repo/OS_TOKEN)"
          release_token="$(cat /tmp/dnf-repo/RELEASE_TOKEN)"
          arch_token="$(cat /tmp/dnf-repo/ARCH_TOKEN)"
          rm -rf "${publish_root}"
          mkdir -p "${publish_root}"
          cd "${publish_root}"

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "${remote_url}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth 1 origin gh-pages
            git reset --hard FETCH_HEAD
          fi

          mkdir -p repo
          rm -rf "repo/${channel}" "repo/${os_token}/${release_token}/${channel}"
          cp -a "${source_root}/${channel}" "repo/${channel}"
          mkdir -p "repo/${os_token}/${release_token}"
          cp -a "${source_root}/${os_token}/${release_token}/${channel}" "repo/${os_token}/${release_token}/${channel}"
          if [[ -f "${GITHUB_WORKSPACE}/SOURCES/RPM-GPG-KEY-nginx" ]]; then
            cp -f "${GITHUB_WORKSPACE}/SOURCES/RPM-GPG-KEY-nginx" "repo/RPM-GPG-KEY-nginx"
          fi

          {
            echo "DNF repository for ${GH_REPO}"
            echo "Legacy path format:"
            echo "- repo/mainline/x86_64"
            echo "- repo/stable/x86_64"
            echo "Structured path format:"
            echo "- repo/${os_token}/${release_token}/${channel}/${arch_token}"
            echo "- repo/${os_token}/${release_token}/${channel}/SRPMS"
          } > repo/README.txt

          if [[ "${{ inputs.publish_alpine_structure }}" == "true" ]]; then
            alpine_v="v${{ inputs.alpine_version }}"
            for arch in x86_64 aarch64; do
              mkdir -p "repo/alpine/${alpine_v}/stable/${arch}"
              mkdir -p "repo/alpine/${alpine_v}/mainline/${arch}"
              touch "repo/alpine/${alpine_v}/stable/${arch}/.keep"
              touch "repo/alpine/${alpine_v}/mainline/${arch}/.keep"
            done
            {
              echo "Alpine APK repository layout"
              echo "Channels:"
              echo "Channels:"
              echo "- stable"
              echo "- mainline"
              echo "Architectures:"
              echo "- x86_64"
              echo "- aarch64"
              echo "Expected path pattern:"
              echo "- repo/alpine/${alpine_v}/<channel>/<arch>/"
            } > "repo/alpine/${alpine_v}/README.txt"
          fi

          git add repo
          if git diff --cached --quiet; then
            echo "No DNF repo changes to publish."
            exit 0
          fi
          git commit -m "repo: publish ${channel} nginx ${NGINX_VERSION} (run ${GITHUB_RUN_ID})"
          git push origin gh-pages

  publish-pages-index:
    if: ${{ inputs.publish_dnf_repo }}
    needs: build
    uses: ./.github/workflows/publish-pages-index.yml
    secrets: inherit

#      - name: Upload artifacts
#        env: RPM_VER=${{ env.NGINX_VERSION }}
#        uses: actions/upload-artifact@v4
#        with:
#          name: nginx-rpms-
#          path: |
#            RPMS/**/*.rpm
#            SRPMS/*.src.rpm
#        continue-on-error: true

#      - name: Echo build outputs
#        shell: bash
#        run: |
#          echo "nginx_version=${{ env.NGINX_VERSION }}"
#          echo "source_repo=${{ env.SOURCE_REPO }}"
#          echo "source_rpm=${{ env.SOURCE_RPM }}"
#          echo "source_tarball=${{ env.SOURCE_TARBALL }}"
