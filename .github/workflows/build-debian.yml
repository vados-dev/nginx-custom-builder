name: Build Debian DEB

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: true
        default: "mainline"
        type: choice
        options:
          - stable
          - mainline
      enabled_modules:
        description: "Space-separated module list override for DEB build"
        required: true
        default: "acme error-page-inherit include-server markdown-filter njs"
        type: string
      disable_debug_packages:
        description: "Exclude debug packages from uploaded/published artifacts"
        required: true
        default: true
        type: boolean
      publish_deb_repo:
        description: "Publish DEB repository to gh-pages"
        required: true
        default: true
        type: boolean
      deb_repo_os:
        description: "DEB repo OS path segment (e.g. debian or ubuntu)"
        required: true
        default: "debian"
        type: string
      debian_suite:
        description: "Debian suite path in repo"
        required: true
        default: "bookworm"
        type: string
  workflow_call:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: false
        default: "mainline"
        type: string
      enabled_modules:
        description: "Space-separated module list override for DEB build"
        required: false
        default: "acme error-page-inherit include-server markdown-filter njs"
        type: string
      disable_debug_packages:
        description: "Exclude debug packages from uploaded/published artifacts"
        required: false
        default: true
        type: boolean
      publish_deb_repo:
        description: "Publish DEB repository to gh-pages"
        required: false
        default: true
        type: boolean
      deb_repo_os:
        description: "DEB repo OS path segment (e.g. debian or ubuntu)"
        required: false
        default: "debian"
        type: string
      debian_suite:
        description: "Debian suite path in repo"
        required: false
        default: "bookworm"
        type: string

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.repository.owner.id == github.event.sender.id }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.amsternl != '' && secrets.amsternl || github.token }}
    container: debian:bookworm
    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          echo 'deb http://deb.debian.org/debian bookworm contrib' >> /etc/apt/sources.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            mercurial \
            devscripts \
            fakeroot \
            debhelper \
            dpkg-dev \
            quilt \
            lsb-release \
            build-essential \
            libxml2-utils \
            xsltproc \
            gnupg \
            apt-utils \
            file \
            zlib1g-dev \
            libssl-dev \
            libpcre2-dev \
            libpcre3-dev \
            libedit-dev \
            libgd-dev \
            libxslt1-dev \
            libperl-dev \
            libcmark-dev \
            pkg-config \
            clang \
            perl

      - name: Install modern Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          export RUSTUP_HOME=/opt/rustup
          export CARGO_HOME=/opt/cargo
          mkdir -p "${RUSTUP_HOME}" "${CARGO_HOME}"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "${CARGO_HOME}/bin" >> "${GITHUB_PATH}"
          echo "RUSTUP_HOME=${RUSTUP_HOME}" >> "${GITHUB_ENV}"
          echo "CARGO_HOME=${CARGO_HOME}" >> "${GITHUB_ENV}"
          "${CARGO_HOME}/bin/rustc" --version
          "${CARGO_HOME}/bin/cargo" --version

      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare contrib directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p contrib/tarballs

      - name: Resolve nginx version for channel
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ inputs.nginx_channel }}"
          version_string="$(curl -fsSL "https://version.nginx.com/nginx/${channel}")"
          nginx_version="${version_string%%-*}"
          if [[ -z "${nginx_version}" ]]; then
            echo "Failed to resolve nginx version for channel: ${channel}" >&2
            exit 1
          fi
          sed -i -E "s/^NGINX_VERSION[[:space:]]*:=.*/NGINX_VERSION := ${nginx_version}/" contrib/src/nginx/version
          echo "nginx_version=${nginx_version}" >> "${GITHUB_OUTPUT}"
          echo "NGINX_VERSION=${nginx_version}" >> "${GITHUB_ENV}"

      - name: Build Debian packages
        shell: bash
        run: |
          set -euo pipefail
          modules="${{ inputs.enabled_modules }}"
          if [[ -n "${modules}" ]]; then
            make -C debian base modules ENABLED_MODULES="${modules}"
          else
            make -C debian base modules
          fi

      - name: Collect DEB artifacts
        shell: bash
        run: |
          set -euo pipefail
          out_dir="/tmp/deb-artifacts"
          rm -rf "${out_dir}"
          mkdir -p "${out_dir}"

          # Primary location used by debian/Makefile build trees.
          find debian -maxdepth 2 -type f \
            \( -name "*.deb" -o -name "*.changes" -o -name "*.buildinfo" \) \
            -exec cp -f {} "${out_dir}/" \;

          # Fallback in case some files are emitted in workspace root.
          find . -maxdepth 1 -type f \
            \( -name "*.deb" -o -name "*.changes" -o -name "*.buildinfo" \) \
            -exec cp -f {} "${out_dir}/" \;

          if [[ "${{ inputs.disable_debug_packages }}" == "true" ]]; then
            rm -f "${out_dir}"/*-dbg_*.deb "${out_dir}"/*-dbgsym_*.deb "${out_dir}"/*.ddeb || true
          fi

          echo "Collected DEB artifacts:"
          ls -la "${out_dir}" || true

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deb-packages-${{ inputs.nginx_channel }}
          path: |
            /tmp/deb-artifacts/*.deb
            /tmp/deb-artifacts/*.changes
            /tmp/deb-artifacts/*.buildinfo

      - name: Build APT repository metadata
        if: ${{ inputs.publish_deb_repo }}
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ inputs.nginx_channel }}"
          repo_os="${{ inputs.deb_repo_os }}"
          suite="${{ inputs.debian_suite }}"
          arch="$(dpkg --print-architecture)"
          repo_root="/tmp/deb-repo/repo/${repo_os}/${suite}/${channel}"
          bin_dir="${repo_root}/binary-${arch}"

          mkdir -p "${bin_dir}"
          cp -f /tmp/deb-artifacts/*.deb "${bin_dir}/"

          (
            cd "${bin_dir}"
            dpkg-scanpackages . /dev/null > Packages
            gzip -9c Packages > Packages.gz
          )

          (
            cd "${repo_root}"
            apt-ftparchive release . > Release
          )

      - name: Publish DEB repository to gh-pages
        if: ${{ inputs.publish_deb_repo }}
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GITHUB token is empty, skip DEB publish."
            exit 0
          fi

          channel="${{ inputs.nginx_channel }}"
          repo_os="${{ inputs.deb_repo_os }}"
          suite="${{ inputs.debian_suite }}"
          publish_root="/tmp/gh-pages-publish"
          source_root="/tmp/deb-repo/repo/${repo_os}/${suite}/${channel}"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"

          rm -rf "${publish_root}"
          mkdir -p "${publish_root}"
          cd "${publish_root}"

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "${remote_url}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth 1 origin gh-pages
            git reset --hard FETCH_HEAD
          fi

          # Legacy location (kept for backward compatibility)
          mkdir -p "repo/debian/${suite}"
          rm -rf "repo/debian/${suite}/${channel}"
          cp -a "${source_root}" "repo/debian/${suite}/${channel}"

          # OS-specific location (matches nginx-style split by distribution)
          mkdir -p "repo/${repo_os}/${suite}"
          rm -rf "repo/${repo_os}/${suite}/${channel}"
          cp -a "${source_root}" "repo/${repo_os}/${suite}/${channel}"

          {
            echo "APT repository"
            echo "OS: ${repo_os}"
            echo "Suite: ${suite}"
            echo "Channels: stable, mainline"
            echo "Legacy path: repo/debian/${suite}/<channel>/binary-<arch>/"
            echo "OS path: repo/${repo_os}/${suite}/<channel>/binary-<arch>/"
          } > "repo/${repo_os}/${suite}/README.txt"

          git add repo/debian "repo/${repo_os}"
          if git diff --cached --quiet; then
            echo "No DEB repo changes to publish."
            exit 0
          fi

          git commit -m "repo: publish debian ${suite}/${channel} nginx ${NGINX_VERSION} (run ${GITHUB_RUN_ID})"
          git push origin gh-pages

  publish-pages-index:
    if: ${{ inputs.publish_deb_repo }}
    needs: build
    uses: ./.github/workflows/publish-pages-index.yml
    secrets: inherit
