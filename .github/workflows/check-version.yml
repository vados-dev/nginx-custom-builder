name: Check And Build pkg-oss

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      base_modules:
        description: "Space-separated RPM modules for pkg-oss (example: acme geoip image-filter njs otel perl xslt)"
        required: false
        default: "acme geoip image-filter njs otel perl xslt"
        type: string
  schedule:
    - cron: "17 * * 3 1"
env:
  DEFAULT_BASE_MODULES: "acme geoip image-filter njs otel perl xslt"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      channels_json: ${{ steps.detect.outputs.channels_json }}
      changed_any: ${{ steps.detect.outputs.changed_any }}
      state_changed: ${{ steps.detect.outputs.state_changed }}
      detect_report: ${{ steps.detect.outputs.detect_report }}
      modules_changed_any: ${{ steps.detect.outputs.modules_changed_any }}
      modules_report: ${{ steps.detect.outputs.modules_report }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect updates
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          changed_any="false"
          state_changed="false"
          modules_changed_any="false"
          channels_json='{"include":[]}'
          detect_report=""
          modules_report=""

          for channel in mainline stable; do
            out="$(bash scripts/detect-channel-update.sh "${channel}")"
            changed="$(awk -F= '/^changed=/{print $2}' <<< "${out}")"
            oldv="$(awk -F= '/^old=/{print $2}' <<< "${out}")"
            newv="$(awk -F= '/^new=/{print $2}' <<< "${out}")"

            detect_report+="${channel}|${oldv}|${newv}|${changed}"$'\n'
            if [[ "${changed}" == "true" ]]; then
              changed_any="true"
              state_changed="true"
              channels_json="$(jq -c --arg ch "${channel}" '.include += [{channel:$ch}]' <<< "${channels_json}")"
            fi
          done

          mod_out="$(bash scripts/detect-custom-module-updates.sh)"
          modules_changed_any="$(awk -F= '/^changed_any=/{print $2}' <<< "${mod_out}" | head -n1)"
          modules_report="$(awk '
            BEGIN {capture=0}
            /^report<<EOF$/ {capture=1; next}
            /^EOF$/ {capture=0; next}
            capture==1 {print}
          ' <<< "${mod_out}")"

          if [[ "${modules_changed_any}" == "true" ]]; then
            changed_any="true"
            state_changed="true"
            channels_json='{"include":[{"channel":"mainline"},{"channel":"stable"}]}'
          fi

          echo "changed_any=${changed_any}" >> "${GITHUB_OUTPUT}"
          echo "state_changed=${state_changed}" >> "${GITHUB_OUTPUT}"
          echo "channels_json=${channels_json}" >> "${GITHUB_OUTPUT}"
          echo "detect_report<<EOF" >> "${GITHUB_OUTPUT}"
          printf '%s' "${detect_report}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"
          echo "modules_changed_any=${modules_changed_any}" >> "${GITHUB_OUTPUT}"
          echo "modules_report<<EOF" >> "${GITHUB_OUTPUT}"
          printf '%s' "${modules_report}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Commit version state
        if: ${{ steps.detect.outputs.state_changed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/version-state/
          git diff --cached --quiet || git commit -m "ci: update nginx version state"
          git push

      - name: Telegram notify updates
        if: ${{ steps.detect.outputs.changed_any == 'true' }}
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${TG_TOKEN:-}" || -z "${TG_CHAT_ID:-}" ]]; then
            exit 0
          fi

          report="$(printf '%s' "${{ steps.detect.outputs.detect_report }}" | sed '/^$/d')"
          modules_report="$(printf '%s' "${{ steps.detect.outputs.modules_report }}" | sed '/^$/d')"
          message="nginx update detected%0Arepo: ${{ github.repository }}"
          while IFS='|' read -r channel prev cur changed; do
            [[ -z "${channel}" ]] && continue
            if [[ "${changed}" == "true" ]]; then
              message+="%0Achannel=${channel}: ${prev} -> ${cur}"
            fi
          done <<< "${report}"
          while IFS='|' read -r mod old_sha new_sha changed; do
            [[ -z "${mod}" ]] && continue
            if [[ "${changed}" == "true" ]]; then
              message+="%0Amodule=${mod}: ${old_sha} -> ${new_sha}"
            fi
          done <<< "${modules_report}"

          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${message}"

  resolve-targets:
    if: ${{ needs.detect.outputs.changed_any == 'true' }}
    needs: detect
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.resolve.outputs.build_matrix }}
      has_targets: ${{ steps.resolve.outputs.has_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve enabled targets
        id: resolve
        shell: bash
        env:
          CHANNELS_JSON: ${{ needs.detect.outputs.channels_json }}
        run: |
          set -euo pipefail

          enabled_targets="$(jq -c '[.targets[] | select(.enabled == true)]' config/targets.json)"
          channels="$(jq -c '.include // []' <<< "${CHANNELS_JSON}")"

          build_matrix="$(jq -nc --argjson targets "${enabled_targets}" --argjson channels "${channels}" '
            {
              include: [
                $channels[] as $c
                | $targets[] as $t
                | {
                    channel: $c.channel,
                    target_id: $t.id,
                    container_image: $t.container_image,
                    rpm_repo_os: $t.rpm_repo_os,
                    rpm_repo_release: ($t.rpm_repo_release|tostring)
                  }
              ]
            }
          ')"

          has_targets="false"
          if [[ "$(jq '.include | length' <<< "${build_matrix}")" -gt 0 ]]; then
            has_targets="true"
          fi

          echo "build_matrix=${build_matrix}" >> "${GITHUB_OUTPUT}"
          echo "has_targets=${has_targets}" >> "${GITHUB_OUTPUT}"

  build-rpm:
    if: ${{ needs.resolve-targets.outputs.has_targets == 'true' }}
    needs:
      - detect
      - resolve-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.resolve-targets.outputs.build_matrix) }}
    container: ${{ matrix.container_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build via pkg-oss
        shell: bash
        env:
          CHANNEL: ${{ matrix.channel }}
          TARGET_ID: ${{ matrix.target_id }}
          BASE_MODULES: ${{ github.event_name == 'workflow_dispatch' && inputs.base_modules || vars.BASE_MODULES || env.DEFAULT_BASE_MODULES }}
        run: |
          set -euo pipefail
          bash scripts/build-pkg-oss.sh

      - name: Telegram notify build result
        if: ${{ always() }}
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${TG_TOKEN:-}" || -z "${TG_CHAT_ID:-}" ]]; then
            exit 0
          fi

          status="${{ job.status }}"
          message="pkg-oss build ${status}%0Arepo: ${{ github.repository }}%0Achannel: ${{ matrix.channel }}%0Atarget: ${{ matrix.target_id }}"

          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${message}"
