name: Check nginx version

permissions:
  contents: write

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mainline
          - stable
      disable_debug_packages:
        description: "Disable debug/debuginfo packages"
        required: true
        default: true
        type: boolean
      force_build:
        description: "Force build even if version is unchanged"
        required: true
        default: false
        type: boolean
      alpine_version:
        description: "APK repo OS"
        required: true
        default: "3.20"
        type: choice
        options:
          - "3.22"
          - "3.21"
          - "3.20"
          - "3.19"
      debian_suite:
        description: "DEB repo OS"
        required: true
        default: "trixie"
        type: choice
        options:
          - "trixie"
          - "bookworm"
          - "bullseye"
      rpm_repo_os:
        description: "DNF repo OS"
        required: true
        default: "centos"
        type: choice
        options:
          - "centos"
          - "almalinux"
          - "rhel"
      rpm_repo_release:
        description: "DNF repo release"
        required: true
        default: "10"
        type: choice
        options:
          - "10"
          - "9"
      build_args:
        description: "rpmbuild arguments"
        required: true
        default: "-bb"
        type: choice
        options:
          - "-bb"
          - "-ba"
      modules_mode:
        description: "How to resolve module base set"
        required: true
        default: "legacy-inputs"
        type: choice
        options:
          - repo-defaults
          - legacy-inputs
          - explicit-global
      modules_global_base:
        description: "Base modules for explicit-global mode (space-separated)"
        required: false
        default: "image-filter perl xslt markdown-filter acme njs error-page-inherit include-server"
        type: string
      modules_add:
        description: "Add modules to resolved base (space-separated)"
        required: false
        default: ""
        type: string
      modules_remove:
        description: "Remove modules from resolved base (space-separated)"
        required: false
        default: ""
        type: string
      modules_common:
        description: "Legacy mode: common modules for all platforms (space-separated)"
        required: true
        default: "image-filter perl xslt error-page-inherit include-server markdown-filter"
        type: string
      modules_rpm_extra:
        description: "Legacy mode: extra modules for RPM"
        required: true
        default: "acme njs"
        type: string
      modules_deb_extra:
        description: "Legacy mode: extra modules for Debian"
        required: true
        default: "acme njs"
        type: string
      modules_alpine_extra:
        description: "Legacy mode: extra modules for Alpine"
        required: true
        default: "acme njs"
        type: string
      modules_rpm_override:
        description: "Override RPM modules completely"
        required: false
        default: ""
        type: string
      modules_deb_override:
        description: "Override Debian modules completely"
        required: false
        default: ""
        type: string
      modules_alpine_override:
        description: "Override Alpine modules completely"
        required: false
        default: ""
        type: string
      run_generate_matrix:
        description: "Run generate-matrix workflow after version/module resolve"
        required: true
        default: true
        type: boolean
      matrix_module_mode:
        description: "Module selection mode for generate-matrix"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - custom
      matrix_modules_override:
        description: "Space-separated module list for generate-matrix when mode=custom"
        required: false
        default: ""
        type: string
      show_available_matrix_modules:
        description: "Print available modules in generate-matrix logs"
        required: false
        default: false
        type: boolean
      publish_repos:
        description: "Publish all repos to gh-pages"
        required: true
        default: true
        type: boolean
      ci_container_image:
        description: "CI container tag for detect/build jobs"
        required: false
        default: "lts"
        type: string

jobs:
  detect:
    if: ${{ github.event_name != 'schedule' || vars.CHECK_VERSION_CRON_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    container: ${{ format('ghcr.io/vados-dev/nginx-custom-builder/ci:{0}', (github.event_name == 'workflow_dispatch' && inputs.ci_container_image || 'lts')) }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      should_build_any: ${{ steps.detect.outputs.should_build_any }}
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
      state_changed: ${{ steps.detect.outputs.state_changed }}
      detect_report: ${{ steps.detect.outputs.detect_report }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug trigger context
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "utc_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Detect latest source version
        id: detect
        shell: bash
        env:
          MANUAL_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.nginx_channel || '' }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_build || false }}
        run: |
          set -euo pipefail

          source /etc/os-release
          os_token="${ID}"
          case "${os_token}" in
            almalinux|rocky|rhel|ol|oraclelinux)
              os_token="centos"
              ;;
          esac
          release_token="${VERSION_ID%%.*}"
          state_dir=".github/version-state"
          requested_channel="${MANUAL_CHANNEL:-}"
          if [[ -z "${requested_channel}" ]]; then
            if [[ "${EVENT_NAME}" == "schedule" ]]; then
              requested_channel="all"
            else
              requested_channel="mainline"
            fi
          fi

          channels=("${requested_channel}")
          if [[ "${requested_channel}" == "all" ]]; then
            channels=("mainline" "stable")
          fi

          should_build_any="false"
          state_changed="false"
          detect_report=""
          build_matrix='{"include":[]}'

          mkdir -p "${state_dir}"

          for channel in "${channels[@]}"; do
            source_repo="nginx-mainline-source"
            if [[ "${channel}" == "stable" ]]; then
              source_repo="nginx-source"
            fi

            repo_file="/tmp/nginx-${channel}.repo"
            cp SOURCES/nginx.repo "${repo_file}"
            sed -i \
              -e "s|OS|${os_token}|g" \
              -e "s|RELEASEVER|${release_token}|g" \
              "${repo_file}"
            sed -i -E 's/^enabled=1$/enabled=0/' "${repo_file}"
            sed -i -E "/^\[${source_repo}\]/,/^\[/{s/^enabled=.*/enabled=1/}" "${repo_file}"
            cp "${repo_file}" /etc/yum.repos.d/nginx.repo

            rm -f nginx-*.src.rpm
            ok=0
            for i in 1 2 3; do
              if dnf -y --disablerepo="*" --enablerepo="${source_repo}" download --source nginx; then
                ok=1
                break
              fi
              echo "Retry dnf source download ${channel} ($i/3)" >&2
              sleep 5
            done
            if [[ "${ok}" -ne 1 ]]; then
              echo "Failed to download nginx source after retries from ${source_repo}" >&2
              exit 1
            fi

            src_rpm="$(ls -1t nginx-*.src.rpm | head -n 1)"
            new_version="$(rpm -qp --queryformat '%{VERSION}\n' "${src_rpm}")"

            state_file="${state_dir}/nginx-${channel}.txt"
            previous_version=""
            if [[ -f "${state_file}" ]]; then
              previous_version="$(tr -d '\r\n' < "${state_file}")"
            fi

            should_build="false"
            reason="unchanged"
            if [[ "${FORCE_BUILD}" == "true" ]]; then
              should_build="true"
              reason="manual-force"
            elif [[ -z "${previous_version}" || "${new_version}" != "${previous_version}" ]]; then
              should_build="true"
              reason="new-version"
            fi

            if [[ "${should_build}" == "true" ]]; then
              should_build_any="true"
              build_matrix="$(jq -c --arg channel "${channel}" '.include += [{channel:$channel}]' <<< "${build_matrix}")"
            fi

            if [[ "${reason}" == "new-version" ]]; then
              printf '%s\n' "${new_version}" > "${state_file}"
              state_changed="true"
            fi

            prev_print="${previous_version:-"(none)"}"
            detect_report+="${channel}|${prev_print}|${new_version}|${reason}"$'\n'
          done

          echo "should_build_any=${should_build_any}" >> "${GITHUB_OUTPUT}"
          echo "build_matrix=${build_matrix}" >> "${GITHUB_OUTPUT}"
          echo "state_changed=${state_changed}" >> "${GITHUB_OUTPUT}"
          echo "detect_report<<EOF" >> "${GITHUB_OUTPUT}"
          printf '%s' "${detect_report}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Commit version state
        if: ${{ steps.detect.outputs.state_changed == 'true' }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git rev-parse --is-inside-work-tree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/version-state/
          git diff --cached --quiet || git commit -m "ci: update nginx version state"
          git push

      - name: Notify Telegram
        if: ${{ steps.detect.outputs.should_build_any == 'true' }}
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${TG_TOKEN:-}" || -z "${TG_CHAT_ID:-}" ]]; then
            echo "Telegram secrets are missing, skip notification."
            exit 0
          fi
          report="$(printf '%s' "${{ steps.detect.outputs.detect_report }}" | sed '/^$/d')"
          message="nginx update detected%0Arepo: ${{ github.repository }}"
          while IFS='|' read -r channel prev cur reason; do
            [[ -z "${channel}" ]] && continue
            message+="%0A%0Achannel: ${channel}%0Afrom: ${prev}%0Ato: ${cur}%0Areason: ${reason}"
          done <<< "${report}"
          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${message}"

  resolve-modules:
    if: ${{ needs.detect.outputs.should_build_any == 'true' }}
    needs: detect
    runs-on: ubuntu-latest
    outputs:
      alpine_modules: ${{ steps.resolve.outputs.alpine_modules }}
      deb_modules: ${{ steps.resolve.outputs.deb_modules }}
      rpm_modules: ${{ steps.resolve.outputs.rpm_modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve module sets
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODULES_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_mode || 'legacy-inputs' }}
          GLOBAL_BASE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_global_base || '' }}
          GLOBAL_ADD: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_add || '' }}
          GLOBAL_REMOVE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_remove || '' }}
          IN_COMMON: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_common || 'image-filter perl xslt error-page-inherit include-server markdown-filter' }}
          IN_RPM_EXTRA: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_rpm_extra || 'acme njs' }}
          IN_DEB_EXTRA: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_deb_extra || 'acme njs' }}
          IN_ALPINE_EXTRA: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_alpine_extra || 'acme njs' }}
          IN_RPM_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_rpm_override || '' }}
          IN_DEB_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_deb_override || '' }}
          IN_ALPINE_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_alpine_override || '' }}
        run: |
          set -euo pipefail

          normalize_modules() {
            local raw="$1"
            if [[ -z "${raw//[[:space:]]/}" ]]; then
              echo ""
              return
            fi
            echo "$raw" | xargs -n1 | awk 'NF && !seen[$0]++' | xargs
          }

          remove_modules() {
            local base="$1"
            local to_remove="$2"
            local out=""
            if [[ -z "${to_remove//[[:space:]]/}" ]]; then
              echo "${base}"
              return
            fi
            for mod in ${base}; do
              if ! grep -qw "${mod}" <<< "${to_remove}"; then
                out="${out} ${mod}"
              fi
            done
            normalize_modules "${out}"
          }

          mode="${MODULES_MODE}"

          rpm_modules=""
          deb_modules=""
          alpine_modules=""

          case "${mode}" in
            repo-defaults)
              deb_modules="$(make --no-print-directory -C debian list-all-modules | awk '{print $1}' | xargs || true)"
              alpine_modules="$(make --no-print-directory -C alpine list-all-modules | awk '{print $1}' | xargs || true)"
              rpm_modules="$(make --no-print-directory -C SPECS list-all-modules | awk '{print $1}' | xargs || true)"
              ;;
            legacy-inputs)
              common="$(normalize_modules "${IN_COMMON}")"
              rpm_extra="$(normalize_modules "${IN_RPM_EXTRA}")"
              deb_extra="$(normalize_modules "${IN_DEB_EXTRA}")"
              alpine_extra="$(normalize_modules "${IN_ALPINE_EXTRA}")"
              rpm_modules="$(normalize_modules "${common} ${rpm_extra}")"
              deb_modules="$(normalize_modules "${common} ${deb_extra}")"
              alpine_modules="$(normalize_modules "${common} ${alpine_extra}")"
              ;;
            explicit-global)
              global_base="$(normalize_modules "${GLOBAL_BASE}")"
              if [[ -z "${global_base}" ]]; then
                echo "modules_mode=explicit-global requires non-empty modules_global_base" >&2
                exit 1
              fi
              rpm_modules="${global_base}"
              deb_modules="${global_base}"
              alpine_modules="${global_base}"
              ;;
            *)
              echo "Unsupported modules_mode: ${mode}" >&2
              exit 1
              ;;
          esac

          rpm_modules="$(normalize_modules "${rpm_modules}")"
          deb_modules="$(normalize_modules "${deb_modules}")"
          alpine_modules="$(normalize_modules "${alpine_modules}")"

          global_add="$(normalize_modules "${GLOBAL_ADD}")"
          global_remove="$(normalize_modules "${GLOBAL_REMOVE}")"

          rpm_modules="$(normalize_modules "${rpm_modules} ${global_add}")"
          deb_modules="$(normalize_modules "${deb_modules} ${global_add}")"
          alpine_modules="$(normalize_modules "${alpine_modules} ${global_add}")"

          rpm_modules="$(remove_modules "${rpm_modules}" "${global_remove}")"
          deb_modules="$(remove_modules "${deb_modules}" "${global_remove}")"
          alpine_modules="$(remove_modules "${alpine_modules}" "${global_remove}")"

          rpm_override="$(normalize_modules "${IN_RPM_OVERRIDE}")"
          deb_override="$(normalize_modules "${IN_DEB_OVERRIDE}")"
          alpine_override="$(normalize_modules "${IN_ALPINE_OVERRIDE}")"

          if [[ -n "${rpm_override}" ]]; then
            rpm_modules="${rpm_override}"
          fi
          if [[ -n "${deb_override}" ]]; then
            deb_modules="${deb_override}"
          fi
          if [[ -n "${alpine_override}" ]]; then
            alpine_modules="${alpine_override}"
          fi

          echo "rpm_modules=${rpm_modules}" >> "${GITHUB_OUTPUT}"
          echo "deb_modules=${deb_modules}" >> "${GITHUB_OUTPUT}"
          echo "alpine_modules=${alpine_modules}" >> "${GITHUB_OUTPUT}"

          echo "Resolved modules:"
          echo "- Mode: ${mode}"
          echo "- RPM: ${rpm_modules}"
          echo "- DEB: ${deb_modules}"
          echo "- Alpine: ${alpine_modules}"

  generate-matrix-checks:
    if: ${{ needs.detect.outputs.should_build_any == 'true' && (github.event_name != 'workflow_dispatch' || inputs.run_generate_matrix) }}
    needs:
      - detect
      - resolve-modules
    uses: ./.github/workflows/generate-matrix.yml
    with:
      module_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.matrix_module_mode || 'auto' }}
      custom_modules: ${{ github.event_name == 'workflow_dispatch' && inputs.matrix_modules_override || '' }}
      show_available_modules: ${{ github.event_name == 'workflow_dispatch' && inputs.show_available_matrix_modules || false }}

  build-rpm:
    if: ${{ needs.detect.outputs.should_build_any == 'true' }}
    needs:
      - detect
      - resolve-modules
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect.outputs.build_matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      nginx_channel: ${{ matrix.channel }}
      build_args: ${{ github.event_name == 'workflow_dispatch' && inputs.build_args || '-bb' }}
      disable_debug_packages: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_debug_packages || true }}
      enabled_modules: ${{ needs['resolve-modules'].outputs.rpm_modules }}
      publish_dnf_repo: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_repos || true }}
      rpm_repo_os: ${{ github.event_name == 'workflow_dispatch' && inputs.rpm_repo_os || 'centos' }}
      rpm_repo_release: ${{ github.event_name == 'workflow_dispatch' && inputs.rpm_repo_release || '10' }}
      ci_container_image: ${{ github.event_name == 'workflow_dispatch' && inputs.ci_container_image || 'lts' }}
    secrets: inherit

  build-debian:
    if: ${{ needs.detect.outputs.should_build_any == 'true' }}
    needs:
      - detect
      - resolve-modules
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect.outputs.build_matrix) }}
    uses: ./.github/workflows/build-debian.yml
    with:
      nginx_channel: ${{ matrix.channel }}
      enabled_modules: ${{ needs['resolve-modules'].outputs.deb_modules }}
      disable_debug_packages: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_debug_packages || true }}
      publish_deb_repo: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_repos || true }}
      debian_suite: ${{ github.event_name == 'workflow_dispatch' && inputs.debian_suite || 'bookworm' }}
    secrets: inherit

  build-alpine:
    if: ${{ needs.detect.outputs.should_build_any == 'true' }}
    needs:
      - detect
      - resolve-modules
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect.outputs.build_matrix) }}
    uses: ./.github/workflows/build-custom-alpine.yml
    with:
      nginx_channel: ${{ matrix.channel }}
      alpine_version: ${{ github.event_name == 'workflow_dispatch' && inputs.alpine_version || '3.20' }}
      enabled_modules: ${{ needs['resolve-modules'].outputs.alpine_modules }}
      disable_debug_packages: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_debug_packages || true }}
      publish_alpine_repo: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_repos || true }}
    secrets: inherit
