name: Check nginx version

permissions:
  contents: write

on:
#  schedule:
#    - cron: "*/7 * * * *"
  workflow_dispatch:
    inputs:
      nginx_channel:
        description: "nginx source channel"
        required: true
        default: "mainline"
        type: choice
        options:
          - stable
          - mainline
      build_args:
        description: "rpmbuild arguments"
        required: true
        default: "-bb"
        type: choice
        options:
          - "-bb"
          - "-ba"
      disable_debug_packages:
        description: "Disable debug/debuginfo packages"
        required: true
        default: true
        type: boolean
      force_build:
        description: "Force build even if version is unchanged"
        required: true
        default: false
        type: boolean
      modules_mode:
        description: "How to resolve module base set"
        required: true
        default: "repo-defaults"
        type: choice
        options:
          - repo-defaults
          - legacy-inputs
          - explicit-global
      modules_global_base:
        description: "Base modules for explicit-global mode (space-separated)"
        required: false
        default: "image-filter perl xslt markdown-filter acme njs error-page-inherit include-server"
        type: string
      modules_add:
        description: "Add modules to resolved base (space-separated)"
        required: false
        default: ""
        type: string
      modules_remove:
        description: "Remove modules from resolved base (space-separated)"
        required: false
        default: ""
        type: string
      modules_common:
        description: "Legacy mode: common modules for all platforms (space-separated)"
        required: true
        default: "error-page-inherit include-server markdown-filter"
        type: string
      modules_rpm_extra:
        description: "Legacy mode: extra modules for RPM"
        required: true
        default: "acme njs"
        type: string
      modules_deb_extra:
        description: "Legacy mode: extra modules for Debian"
        required: true
        default: "acme njs"
        type: string
      modules_alpine_extra:
        description: "Legacy mode: extra modules for Alpine"
        required: true
        default: ""
        type: string
      modules_rpm_override:
        description: "Override RPM modules completely"
        required: false
        default: ""
        type: string
      modules_deb_override:
        description: "Override Debian modules completely"
        required: false
        default: ""
        type: string
      modules_alpine_override:
        description: "Override Alpine modules completely"
        required: false
        default: ""
        type: string
      publish_dnf_repo:
        description: "Publish DNF repo to gh-pages"
        required: true
        default: true
        type: boolean
      publish_deb_repo:
        description: "Publish DEB repo to gh-pages"
        required: true
        default: true
        type: boolean
      publish_alpine_repo:
        description: "Publish APK repo to gh-pages"
        required: true
        default: true
        type: boolean
      debian_suite:
        description: "Debian suite path in repo"
        required: true
        default: "bookworm"
        type: string
      alpine_version:
        description: "Alpine major.minor for repo path, e.g. 3.20"
        required: true
        default: "3.20"
        type: string
      run_generate_matrix:
        description: "Run generate-matrix workflow after version/module resolve"
        required: true
        default: true
        type: boolean
      matrix_module_mode:
        description: "Module selection mode for generate-matrix"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - custom
      matrix_modules_override:
        description: "Space-separated module list for generate-matrix when mode=custom"
        required: false
        default: ""
        type: string
      show_available_matrix_modules:
        description: "Print available modules in generate-matrix logs"
        required: false
        default: false
        type: boolean

jobs:
  detect:
    runs-on: ubuntu-latest
    container: quay.io/centos/centos:stream10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      channel: ${{ steps.detect.outputs.channel }}
      new_version: ${{ steps.detect.outputs.new_version }}
      previous_version: ${{ steps.detect.outputs.previous_version }}
      source_repo: ${{ steps.detect.outputs.source_repo }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - name: Install git for checkout
        shell: bash
        run: |
          set -euo pipefail
          dnf -y install git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug trigger context
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "utc_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Install check dependencies
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            dnf -y install dnf-plugins-core rpm git && break
            echo "Retry dnf install ($i/3)" >&2
            sleep 5
          done

      - name: Detect latest source version
        id: detect
        shell: bash
        env:
          MANUAL_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.nginx_channel || '' }}
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_build || false }}
        run: |
          set -euo pipefail

          channel="${MANUAL_CHANNEL:-mainline}"
          source_repo="nginx-mainline-source"
          if [[ "${channel}" == "stable" ]]; then
            source_repo="nginx-source"
          fi

          source /etc/os-release
          os_token="${ID}"
          release_token="${VERSION_ID%%.*}"
          repo_file="/tmp/nginx.repo"

          cp SOURCES/nginx.repo "${repo_file}"
          sed -i \
            -e "s|OS|${os_token}|g" \
            -e "s|RELEASEVER|${release_token}|g" \
            "${repo_file}"
          sed -i -E 's/^enabled=1$/enabled=0/' "${repo_file}"
          sed -i -E "/^\[${source_repo}\]/,/^\[/{s/^enabled=.*/enabled=1/}" "${repo_file}"
          cp "${repo_file}" /etc/yum.repos.d/nginx.repo

          ok=0
          for i in 1 2 3; do
            if dnf -y --disablerepo="*" --enablerepo="${source_repo}" download --source nginx; then
              ok=1
              break
            fi
            echo "Retry dnf source download ($i/3)" >&2
            sleep 5
          done
          if [[ "${ok}" -ne 1 ]]; then
            echo "Failed to download nginx source after retries from ${source_repo}" >&2
            exit 1
          fi
          src_rpm="$(ls -1t nginx-*.src.rpm | head -n 1)"
          new_version="$(rpm -qp --queryformat '%{VERSION}\n' "${src_rpm}")"

          state_dir=".github/version-state"
          state_file="${state_dir}/nginx-${channel}.txt"
          previous_version=""
          if [[ -f "${state_file}" ]]; then
            previous_version="$(tr -d '\r\n' < "${state_file}")"
          fi

          should_build="false"
          reason="unchanged"
          if [[ "${FORCE_BUILD}" == "true" ]]; then
            should_build="true"
            reason="manual-force"
          elif [[ -z "${previous_version}" || "${new_version}" != "${previous_version}" ]]; then
            should_build="true"
            reason="new-version"
          fi

          if [[ "${should_build}" == "true" ]]; then
            mkdir -p "${state_dir}"
            printf '%s\n' "${new_version}" > "${state_file}"
          fi

          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"
          echo "source_repo=${source_repo}" >> "${GITHUB_OUTPUT}"
          echo "new_version=${new_version}" >> "${GITHUB_OUTPUT}"
          echo "previous_version=${previous_version}" >> "${GITHUB_OUTPUT}"
          echo "should_build=${should_build}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"

      - name: Commit version state
        if: ${{ steps.detect.outputs.reason == 'new-version' }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git rev-parse --is-inside-work-tree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ".github/version-state/nginx-${{ steps.detect.outputs.channel }}.txt"
          git diff --cached --quiet || git commit -m "ci: track nginx ${{ steps.detect.outputs.channel }} ${{ steps.detect.outputs.new_version }}"
          git push

      - name: Notify Telegram
        if: ${{ steps.detect.outputs.should_build == 'true' }}
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${TG_TOKEN:-}" || -z "${TG_CHAT_ID:-}" ]]; then
            echo "Telegram secrets are missing, skip notification."
            exit 0
          fi
          prev="${{ steps.detect.outputs.previous_version }}"
          if [[ -z "${prev}" ]]; then
            prev="(none)"
          fi
          message="nginx update detected%0Achannel: ${{ steps.detect.outputs.channel }}%0Afrom: ${prev}%0Ato: ${{ steps.detect.outputs.new_version }}%0Areason: ${{ steps.detect.outputs.reason }}%0Arepo: ${{ github.repository }}"
          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${message}"

  resolve-modules:
    if: ${{ needs.detect.outputs.should_build == 'true' }}
    needs: detect
    runs-on: ubuntu-latest
    outputs:
      rpm_modules: ${{ steps.resolve.outputs.rpm_modules }}
      deb_modules: ${{ steps.resolve.outputs.deb_modules }}
      alpine_modules: ${{ steps.resolve.outputs.alpine_modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve module sets
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODULES_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_mode || 'repo-defaults' }}
          GLOBAL_BASE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_global_base || '' }}
          GLOBAL_ADD: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_add || '' }}
          GLOBAL_REMOVE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_remove || '' }}
          IN_COMMON: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_common || 'error-page-inherit include-server markdown-filter' }}
          IN_RPM_EXTRA: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_rpm_extra || 'acme njs' }}
          IN_DEB_EXTRA: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_deb_extra || 'acme njs' }}
          IN_ALPINE_EXTRA: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_alpine_extra || '' }}
          IN_RPM_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_rpm_override || '' }}
          IN_DEB_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_deb_override || '' }}
          IN_ALPINE_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.modules_alpine_override || '' }}
        run: |
          set -euo pipefail

          normalize_modules() {
            local raw="$1"
            if [[ -z "${raw//[[:space:]]/}" ]]; then
              echo ""
              return
            fi
            echo "$raw" | xargs -n1 | awk 'NF && !seen[$0]++' | xargs
          }

          remove_modules() {
            local base="$1"
            local to_remove="$2"
            local out=""
            if [[ -z "${to_remove//[[:space:]]/}" ]]; then
              echo "${base}"
              return
            fi
            for mod in ${base}; do
              if ! grep -qw "${mod}" <<< "${to_remove}"; then
                out="${out} ${mod}"
              fi
            done
            normalize_modules "${out}"
          }

          mode="${MODULES_MODE}"

          rpm_modules=""
          deb_modules=""
          alpine_modules=""

          case "${mode}" in
            repo-defaults)
              deb_modules="$(make --no-print-directory -C debian list-all-modules | awk '{print $1}' | xargs || true)"
              alpine_modules="$(make --no-print-directory -C alpine list-all-modules | awk '{print $1}' | xargs || true)"
              rpm_modules="$(make --no-print-directory -C SPECS list-all-modules | awk '{print $1}' | xargs || true)"
              ;;
            legacy-inputs)
              common="$(normalize_modules "${IN_COMMON}")"
              rpm_extra="$(normalize_modules "${IN_RPM_EXTRA}")"
              deb_extra="$(normalize_modules "${IN_DEB_EXTRA}")"
              alpine_extra="$(normalize_modules "${IN_ALPINE_EXTRA}")"
              rpm_modules="$(normalize_modules "${common} ${rpm_extra}")"
              deb_modules="$(normalize_modules "${common} ${deb_extra}")"
              alpine_modules="$(normalize_modules "${common} ${alpine_extra}")"
              ;;
            explicit-global)
              global_base="$(normalize_modules "${GLOBAL_BASE}")"
              if [[ -z "${global_base}" ]]; then
                echo "modules_mode=explicit-global requires non-empty modules_global_base" >&2
                exit 1
              fi
              rpm_modules="${global_base}"
              deb_modules="${global_base}"
              alpine_modules="${global_base}"
              ;;
            *)
              echo "Unsupported modules_mode: ${mode}" >&2
              exit 1
              ;;
          esac

          rpm_modules="$(normalize_modules "${rpm_modules}")"
          deb_modules="$(normalize_modules "${deb_modules}")"
          alpine_modules="$(normalize_modules "${alpine_modules}")"

          global_add="$(normalize_modules "${GLOBAL_ADD}")"
          global_remove="$(normalize_modules "${GLOBAL_REMOVE}")"

          rpm_modules="$(normalize_modules "${rpm_modules} ${global_add}")"
          deb_modules="$(normalize_modules "${deb_modules} ${global_add}")"
          alpine_modules="$(normalize_modules "${alpine_modules} ${global_add}")"

          rpm_modules="$(remove_modules "${rpm_modules}" "${global_remove}")"
          deb_modules="$(remove_modules "${deb_modules}" "${global_remove}")"
          alpine_modules="$(remove_modules "${alpine_modules}" "${global_remove}")"

          rpm_override="$(normalize_modules "${IN_RPM_OVERRIDE}")"
          deb_override="$(normalize_modules "${IN_DEB_OVERRIDE}")"
          alpine_override="$(normalize_modules "${IN_ALPINE_OVERRIDE}")"

          if [[ -n "${rpm_override}" ]]; then
            rpm_modules="${rpm_override}"
          fi
          if [[ -n "${deb_override}" ]]; then
            deb_modules="${deb_override}"
          fi
          if [[ -n "${alpine_override}" ]]; then
            alpine_modules="${alpine_override}"
          fi

          echo "rpm_modules=${rpm_modules}" >> "${GITHUB_OUTPUT}"
          echo "deb_modules=${deb_modules}" >> "${GITHUB_OUTPUT}"
          echo "alpine_modules=${alpine_modules}" >> "${GITHUB_OUTPUT}"

          echo "Resolved modules:"
          echo "- Mode: ${mode}"
          echo "- RPM: ${rpm_modules}"
          echo "- DEB: ${deb_modules}"
          echo "- Alpine: ${alpine_modules}"

  resolve-matrix-modules:
    if: ${{ needs.detect.outputs.should_build == 'true' }}
    needs:
      - detect
      - resolve-modules
    runs-on: ubuntu-latest
    outputs:
      matrix_modules: ${{ steps.resolve.outputs.matrix_modules }}
    steps:
      - name: Resolve matrix module set
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.matrix_module_mode || 'auto' }}
          OVERRIDE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.matrix_modules_override || '' }}
          RPM_MODULES: ${{ needs['resolve-modules'].outputs.rpm_modules }}
          DEB_MODULES: ${{ needs['resolve-modules'].outputs.deb_modules }}
          ALPINE_MODULES: ${{ needs['resolve-modules'].outputs.alpine_modules }}
        run: |
          set -euo pipefail

          normalize_modules() {
            local raw="$1"
            if [[ -z "${raw//[[:space:]]/}" ]]; then
              echo ""
              return
            fi
            echo "$raw" | xargs -n1 | awk 'NF && !seen[$0]++' | xargs
          }

          union_modules="$(normalize_modules "${RPM_MODULES} ${DEB_MODULES} ${ALPINE_MODULES}")"
          mode="${MODE_INPUT}"
          override="$(normalize_modules "${OVERRIDE_INPUT}")"

          matrix_modules="${union_modules}"
          if [[ "${mode}" == "custom" ]]; then
            if [[ -z "${override}" ]]; then
              echo "matrix_module_mode=custom requires non-empty matrix_modules_override" >&2
              exit 1
            fi
            matrix_modules="${override}"
          fi

          echo "matrix_modules=${matrix_modules}" >> "${GITHUB_OUTPUT}"
          echo "Resolved matrix modules: ${matrix_modules}"

  generate-matrix-checks:
    if: ${{ needs.detect.outputs.should_build == 'true' && (github.event_name != 'workflow_dispatch' || inputs.run_generate_matrix) }}
    needs:
      - detect
      - resolve-modules
      - resolve-matrix-modules
    uses: ./.github/workflows/generate-matrix.yml
    with:
      module_mode: custom
      custom_modules: ${{ needs['resolve-matrix-modules'].outputs.matrix_modules }}
      show_available_modules: ${{ github.event_name == 'workflow_dispatch' && inputs.show_available_matrix_modules || false }}

  build-rpm:
    if: ${{ needs.detect.outputs.should_build == 'true' }}
    needs:
      - detect
      - resolve-modules
    uses: ./.github/workflows/build.yml
    with:
      nginx_channel: ${{ needs.detect.outputs.channel }}
      build_args: ${{ github.event_name == 'workflow_dispatch' && inputs.build_args || '-bb' }}
      disable_debug_packages: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_debug_packages || true }}
      enabled_modules: ${{ needs['resolve-modules'].outputs.rpm_modules }}
      publish_dnf_repo: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_dnf_repo || true }}
      alpine_version: ${{ github.event_name == 'workflow_dispatch' && inputs.alpine_version || '3.20' }}
      publish_alpine_structure: true
    secrets: inherit

  build-debian:
    if: ${{ needs.detect.outputs.should_build == 'true' }}
    needs:
      - detect
      - resolve-modules
    uses: ./.github/workflows/build-debian.yml
    with:
      nginx_channel: ${{ needs.detect.outputs.channel }}
      enabled_modules: ${{ needs['resolve-modules'].outputs.deb_modules }}
      publish_deb_repo: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_deb_repo || true }}
      debian_suite: ${{ github.event_name == 'workflow_dispatch' && inputs.debian_suite || 'bookworm' }}
    secrets: inherit

  build-alpine:
    if: ${{ needs.detect.outputs.should_build == 'true' }}
    needs:
      - detect
      - resolve-modules
    uses: ./.github/workflows/build-custom-alpine.yml
    with:
      nginx_channel: ${{ needs.detect.outputs.channel }}
      alpine_version: ${{ github.event_name == 'workflow_dispatch' && inputs.alpine_version || '3.20' }}
      enabled_modules: ${{ needs['resolve-modules'].outputs.alpine_modules }}
      publish_alpine_repo: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_alpine_repo || true }}
    secrets: inherit
