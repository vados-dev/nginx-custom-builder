name: Check And Build pkg-oss

permissions:
  contents: write

env:
  DEFAULT_BASE_IMAGE: "ghcr.io/vados-dev/nginx-custom-builder/centos-10:lts"
  DEFAULT_BUILD_BASE: false
  DEFAULT_BASE_MODULES: ""
  NOTIFY_ON_UPDATE: false
  NOTIFY_ON_RESULT: false

on:
  schedule:
    - cron: "17 * * 3 1"

  workflow_dispatch:
    inputs:
      nginx_channel:
        description: "Channel"
        required: true
        default: "all"
        type: choice
        options: [all, mainline, stable]
      build_os:
        description: "Build target OS"
        required: true
        default: "centos-10"
        type: choice
        options: [all, centos-10, almalinux-9]
      force_build:
        description: "Build even if no updates detected"
        required: true
        default: true
        type: boolean
        
      base_modules:
        description: "Space-separated RPM modules for pkg-oss (example: acme geoip2 image-filter njs otel perl xslt)"
        required: false
        default: ""
        type: string
      base_modules:
        description: "Space-separated RPM modules for pkg-oss (example: acme geoip2 image-filter njs otel perl xslt)"
        required: false
        default: ""
        type: string
      disable_debug_packages:
        description: "Disable debug/debuginfo packages"
        required: true
        default: true
        type: boolean
      build_args:
        description: "rpmbuild mode"
        required: true
        default: "-bb"
        type: choice
        options:
          - "-bb"
          - "-ba"
      publish_dnf_repo:
        description: "Publish DNF repository to gh-pages"
        required: true
        default: true
        type: boolean
      upload_release:
        description: "Upload to release"
        required: true
        default: "none"
        type: choice
        options: [none, release, prerelease]
      release_tag:
        description: "Optional release tag (must start with v, e.g. v0.0.1)"
        required: false
        default: ""
        type: string

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      channels_json: ${{ steps.detect.outputs.channels_json }}
      changed_any: ${{ steps.detect.outputs.changed_any }}
      state_changed: ${{ steps.detect.outputs.state_changed }}
      detect_report: ${{ steps.detect.outputs.detect_report }}
      modules_changed_any: ${{ steps.detect.outputs.modules_changed_any }}
      modules_report: ${{ steps.detect.outputs.modules_report }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect updates
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NGINX_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.nginx_channel || 'all' }}
          INPUT_FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_build || false }}
        run: |
          set -euo pipefail

          changed_any="false"
          state_changed="false"
          modules_changed_any="false"
          channels_json='{"include":[]}'
          detect_report=""
          modules_report=""

          channels=(mainline stable)
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            case "${INPUT_NGINX_CHANNEL}" in
              all) channels=(mainline stable) ;;
              mainline) channels=(mainline) ;;
              stable) channels=(stable) ;;
              *) echo "Unsupported nginx_channel: ${INPUT_NGINX_CHANNEL}" >&2; exit 1 ;;
            esac
          fi

          for channel in "${channels[@]}"; do
            out="$(bash scripts/detect-channel-update.sh "${channel}")"
            changed="$(awk -F= '/^changed=/{print $2}' <<< "${out}")"
            oldv="$(awk -F= '/^old=/{print $2}' <<< "${out}")"
            newv="$(awk -F= '/^new=/{print $2}' <<< "${out}")"

            detect_report+="${channel}|${oldv}|${newv}|${changed}"$'\n'
            if [[ "${changed}" == "true" ]]; then
              changed_any="true"
              state_changed="true"
              channels_json="$(jq -c --arg ch "${channel}" '.include += [{channel:$ch}]' <<< "${channels_json}")"
            fi
          done

          mod_out="$(bash scripts/detect-custom-module-updates.sh)"
          modules_changed_any="$(awk -F= '/^changed_any=/{print $2}' <<< "${mod_out}" | head -n1)"
          modules_report="$(awk '
            BEGIN {capture=0}
            /^report<<EOF$/ {capture=1; next}
            /^EOF$/ {capture=0; next}
            capture==1 {print}
          ' <<< "${mod_out}")"

          if [[ "${modules_changed_any}" == "true" ]]; then
            changed_any="true"
            state_changed="true"
            channels_json='{"include":[{"channel":"mainline"},{"channel":"stable"}]}'
          fi
          if [[ "${EVENT_NAME}" == "workflow_dispatch" && "${INPUT_FORCE_BUILD}" == "true" ]]; then
            changed_any="true"
            channels_json='{"include":[]}'
            for ch in "${channels[@]}"; do
              channels_json="$(jq -c --arg ch "${ch}" '.include += [{channel:$ch}]' <<< "${channels_json}")"
            done
          fi

          echo "changed_any=${changed_any}" >> "${GITHUB_OUTPUT}"
          echo "state_changed=${state_changed}" >> "${GITHUB_OUTPUT}"
          echo "channels_json=${channels_json}" >> "${GITHUB_OUTPUT}"
          delim1="DETECT_REPORT_$(date +%s)_$RANDOM"
          echo "detect_report<<${delim1}" >> "${GITHUB_OUTPUT}"
          printf '%s' "${detect_report}" >> "${GITHUB_OUTPUT}"
          echo >> "${GITHUB_OUTPUT}"
          echo "${delim1}" >> "${GITHUB_OUTPUT}"
          echo "modules_changed_any=${modules_changed_any}" >> "${GITHUB_OUTPUT}"
          delim2="MODULES_REPORT_$(date +%s)_$RANDOM"
          echo "modules_report<<${delim2}" >> "${GITHUB_OUTPUT}"
          printf '%s' "${modules_report}" >> "${GITHUB_OUTPUT}"
          echo >> "${GITHUB_OUTPUT}"
          echo "${delim2}" >> "${GITHUB_OUTPUT}"

      - name: Commit version state
        if: ${{ steps.detect.outputs.state_changed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/version-state/
          git diff --cached --quiet || git commit -m "ci: update nginx version state"
          git push

      - name: Telegram notify updates
        if: ${{ steps.detect.outputs.changed_any == 'true' && env.NOTIFY_ON_UPDATE == 'true' }}
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${TG_TOKEN:-}" || -z "${TG_CHAT_ID:-}" ]]; then
            exit 0
          fi

          report="$(printf '%s' "${{ steps.detect.outputs.detect_report }}" | sed '/^$/d')"
          modules_report="$(printf '%s' "${{ steps.detect.outputs.modules_report }}" | sed '/^$/d')"
          message="nginx update detected%0Arepo: ${{ github.repository }}"
          while IFS='|' read -r channel prev cur changed; do
            [[ -z "${channel}" ]] && continue
            if [[ "${changed}" == "true" ]]; then
              message+="%0Achannel=${channel}: ${prev} -> ${cur}"
            fi
          done <<< "${report}"
          while IFS='|' read -r mod old_sha new_sha changed; do
            [[ -z "${mod}" ]] && continue
            if [[ "${changed}" == "true" ]]; then
              message+="%0Amodule=${mod}: ${old_sha} -> ${new_sha}"
            fi
          done <<< "${modules_report}"

          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${message}"

  resolve-targets:
    if: ${{ needs.detect.outputs.changed_any == 'true' }}
    needs: detect
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.resolve.outputs.build_matrix }}
      has_targets: ${{ steps.resolve.outputs.has_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve enabled targets
        id: resolve
        shell: bash
        env:
          CHANNELS_JSON: ${{ needs.detect.outputs.channels_json }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUILD_OS: ${{ github.event_name == 'workflow_dispatch' && inputs.build_os || 'all' }}
          CI_BASE_IMAGE: ${{ github.event_name == 'workflow_dispatch' && env.DEFAULT_BASE_IMAGE || '' }}
        run: |
          set -euo pipefail

          enabled_targets="$(jq -c '[.targets[] | select(.enabled == true)]' config/targets.json)"
          if [[ "${EVENT_NAME}" == "workflow_dispatch" && "${INPUT_BUILD_OS}" != "all" ]]; then
            enabled_targets="$(jq -c --arg id "${INPUT_BUILD_OS}" '[.targets[] | select(.id == $id and .enabled == true)]' config/targets.json)"
          fi
          if [[ "${EVENT_NAME}" == "workflow_dispatch" && -n "${CI_BASE_IMAGE}" ]]; then
            enabled_targets="$(jq -c --arg img "${CI_BASE_IMAGE}" 'map(.container_image = $img)' <<< "${enabled_targets}")"
          fi
          channels="$(jq -c '.include // []' <<< "${CHANNELS_JSON}")"

          build_matrix="$(jq -nc --argjson targets "${enabled_targets}" --argjson channels "${channels}" '
            {
              include: [
                $channels[] as $c
                | $targets[] as $t
                | {
                    channel: $c.channel,
                    target_id: $t.id,
                    container_image: $t.container_image,
                    rpm_repo_os: $t.rpm_repo_os,
                    rpm_repo_release: ($t.rpm_repo_release|tostring)
                  }
              ]
            }
          ')"

          has_targets="false"
          if [[ "$(jq '.include | length' <<< "${build_matrix}")" -gt 0 ]]; then
            has_targets="true"
          fi

          echo "build_matrix=${build_matrix}" >> "${GITHUB_OUTPUT}"
          echo "has_targets=${has_targets}" >> "${GITHUB_OUTPUT}"

  build-rpm:
    if: ${{ needs.resolve-targets.outputs.has_targets == 'true' }}
    needs:
      - detect
      - resolve-targets
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.amsternl != '' && secrets.amsternl || github.token }}
      RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.resolve-targets.outputs.build_matrix) }}
    container: ${{ matrix.container_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve nginx version
        id: nginx_version
        shell: bash
        env:
          CHANNEL: ${{ matrix.channel }}
          NGINX_REPO_OS: ${{ matrix.rpm_repo_os }}
          NGINX_REPO_RELEASE: ${{ matrix.rpm_repo_release }}
        run: |
          set -euo pipefail
          version="$(bash scripts/get-nginx-srpm-version.sh)"
          echo "nginx_version=${version}" >> "$GITHUB_OUTPUT"

      - name: Get env variables
        shell: bash
        run: |
          set -euo pipefail
          echo "DT_STAMP=$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "DateTime=$(date +%d.%m.%Y-%T)" >> "$GITHUB_ENV"
          echo "REF=${{ github.ref }}" >> "$GITHUB_ENV"
          echo "REF_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "GITHUB_RUN_ID=${{ github.run_id }}" >> "$GITHUB_ENV"
          echo "SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "NGINX_VERSION=${{ steps.nginx_version.outputs.nginx_version }}" >> "$GITHUB_ENV"
          echo "CHANNEL=${{ matrix.channel }}" >> "$GITHUB_ENV"
          echo "TARGET_ID=${{ matrix.target_id }}"  >> "$GITHUB_ENV"
          echo "BASE_MODULES=${{ github.event_name == 'workflow_dispatch' && inputs.base_modules || vars.BASE_MODULES || env.DEFAULT_BASE_MODULES }}" >> "$GITHUB_ENV"
          echo "RPM_REPO_OS=${{ matrix.rpm_repo_os }}" >> "$GITHUB_ENV"
          echo "RPM_REPO_RELEASE=${{ matrix.rpm_repo_release }}" >> "$GITHUB_ENV"
          echo "BUILD_ARGS=${{ github.event_name == 'workflow_dispatch' && inputs.build_args || '-bb' }}" >> "$GITHUB_ENV"
          requested_tag='${{ inputs.release_tag }}'

          calc_next_tag() {
            local prev="$1"
            local major minor patch
            if [[ ! "${prev}" =~ ^v([0-9]{1,2})\.([0-9]{1,2})\.([0-9]{1,2})$ ]]; then
              echo "Invalid previous release tag format: ${prev}" >&2
              return 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            patch=$((10#${patch} + 1))
            if (( patch > 99 )); then
              patch=0
              minor=$((10#${minor} + 1))
            fi
            if (( minor > 99 )); then
              minor=0
              major=$((10#${major} + 1))
            fi
            if (( major > 99 )); then
              echo "release_tag overflow: v99.99.99 is the maximum supported tag" >&2
              return 1
            fi
            printf 'v%d.%d.%d\n' "${major}" "${minor}" "${patch}"
          }

          detect_previous_release_tag() {
            local remote_url latest
            remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            latest="$(
              git ls-remote --refs --tags "${remote_url}" \
                | awk -F/ '{print $NF}' \
                | grep -E '^v([0-9]{1,2})\.([0-9]{1,2})\.([0-9]{1,2})$' \
                | sort -t. -k1.2,1n -k2,2n -k3,3n \
                | tail -n1
            )"
            if [[ -n "${latest}" ]]; then
              printf '%s\n' "${latest}"
            fi
          }

          suffix_input=""
          explicit_tag=""
          if [[ -n "${requested_tag}" ]]; then
            if [[ "${requested_tag}" =~ ^v([0-9]{1,2})\.([0-9]{1,2})\.([0-9]{1,2})([a-z])?$ ]]; then
              explicit_tag="${requested_tag}"
            elif [[ "${requested_tag}" =~ ^[a-z]$ ]]; then
              suffix_input="${requested_tag}"
            else
              echo "Invalid release_tag: ${requested_tag}" >&2
              echo "Expected: full tag vX.Y.Z[letter] or single suffix letter (e.g. b)" >&2
              exit 1
            fi
          fi

          if [[ -n "${explicit_tag}" ]]; then
            if [[ "${explicit_tag}" =~ ^(main|master|develop|dev)$ ]]; then
              echo "Ref-like tag names are forbidden: ${explicit_tag}" >&2
              exit 1
            fi
            echo "RELEASE_TAG=${explicit_tag}" >> "$GITHUB_ENV"
          else
            previous_tag="$(detect_previous_release_tag || true)"
            if [[ -n "${previous_tag}" ]]; then
              next_tag="$(calc_next_tag "${previous_tag}")"
              echo "RELEASE_TAG=${next_tag}${suffix_input}" >> "$GITHUB_ENV"
              echo "PREVIOUS_RELEASE_TAG=${previous_tag}" >> "$GITHUB_ENV"
            else
              echo "RELEASE_TAG=v0.0.1${suffix_input}" >> "$GITHUB_ENV"
            fi
          fi
        continue-on-error: true

      - name: Build via pkg-oss
        id: build
        shell: bash
        env:
          CHANNEL: ${{ matrix.channel }}
          TARGET_ID: ${{ matrix.target_id }}
          BUILD_BASE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_base || env.DEFAULT_BUILD_BASE }}
          BASE_MODULES: ${{ github.event_name == 'workflow_dispatch' && inputs.base_modules || vars.BASE_MODULES || env.DEFAULT_BASE_MODULES }}
          BUILD_ARGS: ${{ github.event_name == 'workflow_dispatch' && inputs.build_args || '-bb' }}
        run: |
          set -euo pipefail
          bash scripts/build-pkg-oss.sh

      - name: Import GPG key
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ env.RPM_GPG_PRIVATE_KEY }}
        continue-on-error: true

      - name: Sign RPM packages
        if: ${{ steps.import_gpg.outcome == 'success' }}
        shell: bash
        env:
          RPM_GPG_KEYID: ${{ steps.import_gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail
          export GPG_TTY="${GPG_TTY:-$(tty 2>/dev/null || true)}"
          if [ -n "${RPM_GPG_PASSPHRASE:-}" ]; then
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${RPM_GPG_KEYID}
          %_gpg_path %{getenv:HOME}/.gnupg
          %_gpgbin /usr/bin/gpg
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} --batch --yes --pinentry-mode loopback --passphrase '${RPM_GPG_PASSPHRASE}' --no-armor --local-user "%{_gpg_name}" --detach-sign --output %{__signature_filename} %{__plaintext_filename}
          EOF
          else
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${RPM_GPG_KEYID}
          %_gpg_path %{getenv:HOME}/.gnupg
          %_gpgbin /usr/bin/gpg
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} --batch --yes --no-armor --local-user "%{_gpg_name}" --detach-sign --output %{__signature_filename} %{__plaintext_filename}
          EOF
          fi

          echo "Using GPG key: ${RPM_GPG_KEYID}"
          gpg --list-secret-keys --keyid-format LONG
          if [[ "${{ inputs.build_args }}" == "-ba" ]]; then
            find rpm/RPMS rpm/SRPMS -type f -name '*.rpm' -print0 | xargs -0 -r rpmsign --addsign
          else
            find rpm/RPMS -type f -name '*.rpm' -print0 | xargs -0 -r rpmsign --addsign
          fi
        continue-on-error: true

      - name: Verify RPM signatures
        if: ${{ steps.import_gpg.outcome == 'success' }}
        shell: bash
        env:
          RPM_GPG_KEYID: ${{ steps.import_gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail
          if [[ -f "src/RPM-GPG-KEY-nginx" ]]; then
            rpm --import "src/RPM-GPG-KEY-nginx"
          else
            gpg --batch --yes --armor --export "${RPM_GPG_KEYID}" > /tmp/RPM-GPG-KEY-build
            rpm --import /tmp/RPM-GPG-KEY-build
          fi

          if [[ "${{ inputs.build_args }}" == "-ba" ]]; then
            rpm -Kv rpm/RPMS/x86_64/*.rpm rpm/SRPMS/*.src.rpm
          else
            rpm -Kv rpm/RPMS/x86_64/*.rpm 
          fi
        continue-on-error: true

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm__${{ matrix.target_id }}__${{ matrix.channel }}
          path: |
            rpm/RPMS/**/*.rpm
            rpm/SRPMS/*.src.rpm
          if-no-files-found: warn
        continue-on-error: true

      - name: Upload to release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release != 'none' }}
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        with:
          files: |
            rpm/RPMS/**/*.rpm
            rpm/SRPMS/*.src.rpm
          name: "Build custom: ${{ env.RELEASE_TAG }} nginx ${{ env.NGINX_VERSION }} (${{ env.CHANNEL }})"
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ inputs.upload_release == 'prerelease' }}
          body: |
            Build info:
            - Date: ${{ env.DateTime }}
            - Run ID: ${{ env.GITHUB_RUN_ID }}
            - Ref: ${{ env.REF }}
            - Ref name: ${{ env.REF_NAME }}
            - SHA: ${{ env.SHA }}
            - nginx channel: ${{ env.CHANNEL }}
            - target id: ${{ env.TARGET_ID }}
            - rpm repo os: ${{ env.RPM_REPO_OS }}
            - rpm repo release: ${{ env.RPM_REPO_RELEASE }}
            - release tag: ${{ env.RELEASE_TAG }}
            - nginx version: ${{ env.NGINX_VERSION }}
            - rpmbuild arguments: ${{ env.BUILD_ARGS }}
            - enabled base modules: ${{ env.BASE_MODULES }}
        continue-on-error: true

      - name: Build DNF repository metadata
        if: ${{ inputs.publish_dnf_repo }}
        shell: bash
        run: |
          set -euo pipefail
          source /etc/os-release
          os_token="${ID}"
          case "${os_token}" in
            almalinux|rocky|rhel|ol|oraclelinux)
              os_token="centos"
              ;;
          esac
          release_token="${VERSION_ID%%.*}"
          repo_os_override="${{ env.RPM_REPO_OS }}"
          repo_release_override="${{ env.RPM_REPO_RELEASE }}"
          if [[ -n "${repo_os_override}" ]]; then
            os_token="${repo_os_override}"
          fi
          if [[ -n "${repo_release_override}" ]]; then
            release_token="${repo_release_override}"
          fi
          arch_token="$(uname -m)"
          channel="${{ env.CHANNEL }}"

          # Legacy flat layout (kept for backward compatibility)
          legacy_root="/tmp/dnf-repo/repo/${channel}"
          mkdir -p "${legacy_root}/${arch_token}" "${legacy_root}/SRPMS"
          cp -f rpm/RPMS/"${arch_token}"/*.rpm "${legacy_root}/${arch_token}/"
          if compgen -G "rpm/SRPMS/*.src.rpm" > /dev/null; then
            cp -f rpm/SRPMS/*.src.rpm "${legacy_root}/SRPMS/"
          fi
          createrepo_c --update "${legacy_root}/${arch_token}"
          if compgen -G "${legacy_root}/SRPMS/*.src.rpm" > /dev/null; then
            createrepo_c --update "${legacy_root}/SRPMS"
          fi
          printf '%s\n' "${NGINX_VERSION}" > "${legacy_root}/VERSION"

          # Structured layout with releasever/basearch support:
          # repo/<os>/<release>/<channel>/<arch>/ and .../SRPMS/
          structured_root="/tmp/dnf-repo/repo/${os_token}/${release_token}/${channel}"
          mkdir -p "${structured_root}/${arch_token}" "${structured_root}/SRPMS"
          cp -f rpm/RPMS/"${arch_token}"/*.rpm "${structured_root}/${arch_token}/"
          if compgen -G "rpm/SRPMS/*.src.rpm" > /dev/null; then
            cp -f rpm/SRPMS/*.src.rpm "${structured_root}/SRPMS/"
          fi
          createrepo_c --update "${structured_root}/${arch_token}"
          if compgen -G "${structured_root}/SRPMS/*.src.rpm" > /dev/null; then
            createrepo_c --update "${structured_root}/SRPMS"
          fi
          printf '%s\n' "${NGINX_VERSION}" > "${structured_root}/VERSION"
          printf '%s\n' "${os_token}" > /tmp/dnf-repo/OS_TOKEN
          printf '%s\n' "${release_token}" > /tmp/dnf-repo/RELEASE_TOKEN
          printf '%s\n' "${arch_token}" > /tmp/dnf-repo/ARCH_TOKEN

      - name: Publish DNF repository to gh-pages
        if: ${{ inputs.publish_dnf_repo }}
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GITHUB token is empty, skip DNF publish."
            exit 0
          fi

          publish_root="/tmp/gh-pages-publish"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          channel="${{ env.CHANNEL }}"
          source_root="/tmp/dnf-repo/repo"
          source_root="/tmp/dnf-repo/repo"
          source_root="/tmp/dnf-repo/repo"
          os_token="$(cat /tmp/dnf-repo/OS_TOKEN)"
          release_token="$(cat /tmp/dnf-repo/RELEASE_TOKEN)"
          arch_token="$(cat /tmp/dnf-repo/ARCH_TOKEN)"
          rm -rf "${publish_root}"
          mkdir -p "${publish_root}"
          cd "${publish_root}"

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "${remote_url}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth 1 origin gh-pages
            git reset --hard FETCH_HEAD
          fi

          mkdir -p repo
          rm -rf "repo/${channel}" "repo/${os_token}/${release_token}/${channel}"
          cp -a "${source_root}/${channel}" "repo/${channel}"
          mkdir -p "repo/${os_token}/${release_token}"
          cp -a "${source_root}/${os_token}/${release_token}/${channel}" "repo/${os_token}/${release_token}/${channel}"
          if [[ -f "${GITHUB_WORKSPACE}/SOURCES/RPM-GPG-KEY-nginx" ]]; then
            cp -f "${GITHUB_WORKSPACE}/SOURCES/RPM-GPG-KEY-nginx" "repo/RPM-GPG-KEY-nginx"
          fi

          {
            echo "DNF repository for ${GH_REPO}"
            echo "Legacy path format:"
            echo "- repo/mainline/x86_64"
            echo "- repo/stable/x86_64"
            echo "Structured path format:"
            echo "- repo/${os_token}/${release_token}/${channel}/${arch_token}"
            echo "- repo/${os_token}/${release_token}/${channel}/SRPMS"
          } > repo/README.txt

          if [[ "${{ inputs.publish_alpine_structure }}" == "true" ]]; then
            alpine_v="v${{ inputs.alpine_version }}"
            for arch in x86_64 aarch64; do
              mkdir -p "repo/alpine/${alpine_v}/stable/${arch}"
              mkdir -p "repo/alpine/${alpine_v}/mainline/${arch}"
              touch "repo/alpine/${alpine_v}/stable/${arch}/.keep"
              touch "repo/alpine/${alpine_v}/mainline/${arch}/.keep"
            done
            {
              echo "Alpine APK repository layout"
              echo "Channels:"
              echo "Channels:"
              echo "- stable"
              echo "- mainline"
              echo "Architectures:"
              echo "- x86_64"
              echo "- aarch64"
              echo "Expected path pattern:"
              echo "- repo/alpine/${alpine_v}/<channel>/<arch>/"
            } > "repo/alpine/${alpine_v}/README.txt"
          fi

          git add repo
          if git diff --cached --quiet; then
            echo "No DNF repo changes to publish."
            exit 0
          fi
          git commit -m "repo: publish ${channel} nginx ${NGINX_VERSION} (run ${GITHUB_RUN_ID})"
          git push origin gh-pages

      - name: Telegram notify build result
        if: ${{ env.NOTIFY_ON_RESULT == 'true' }}
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${TG_TOKEN:-}" || -z "${TG_CHAT_ID:-}" ]]; then
            exit 0
          fi

          status="${{ job.status }}"
          message="pkg-oss build ${status}%0Arepo: ${{ github.repository }}%0Achannel: ${{ matrix.channel }}%0Atarget: ${{ matrix.target_id }}"

          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${message}"

  publish-pages-index:
    if: ${{ inputs.publish_dnf_repo }}
    needs: build-rpm
    uses: ./.github/workflows/publish-pages-index.yml
    secrets: inherit
