services:
  nginx-ci-runner:
    image: ${CI_IMAGE:-reg.vados.ru/nginx-custom-builder-ci:lts}
    build:
      context: .
      dockerfile: Dockerfile.ci
      args:
        CI_BASE_IMAGE: ${CI_BASE_IMAGE:-centos:stream10}
    environment:
      HOME: /work/.ci-home
      USER: git
      LOGNAME: git
    command: ["bash", "-lc", "sleep infinity"]
    working_dir: /work
    volumes:
      - ./:/work
    restart: unless-stopped
