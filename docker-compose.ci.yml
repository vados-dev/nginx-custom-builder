services:
  nginx-ci-runner:
    image: reg.vados.ru/nginx-custom-builder-ci:lts
    build:
      context: .
      dockerfile: Dockerfile.ci
      args:
        CI_BASE_IMAGE: ${CI_BASE_IMAGE:-almalinux:9}
    command: ["bash", "-lc", "sleep infinity"]
    working_dir: /work
    volumes:
      - ./:/work
    restart: unless-stopped
