version: "3.9"

services:
  nginx-ci-runner:
    image: reg.vados.ru/nginx-rpmbuild-ci:lts
    command: ["bash", "-lc", "sleep infinity"]
    working_dir: /work
    volumes:
      - /home/git/projects/nginx-rpmbuild:/work
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
