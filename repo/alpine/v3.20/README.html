<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>README - Index of /repo/alpine/v3.20</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Roboto, sans-serif; background: #f6f8fa; color: #111827; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 48px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; }
    .links { margin: 0 0 18px; padding: 0; list-style: none; display: flex; flex-wrap: wrap; gap: 10px; }
    .links a { text-decoration: none; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 10px; color: #111827; background: #f9fafb; }
    #readme { line-height: 1.55; overflow-wrap: anywhere; }
    #readme pre { background: #0b1020; color: #e5e7eb; border-radius: 8px; padding: 12px; overflow-x: auto; white-space: pre-wrap; }
    #readme code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    #readme table { border-collapse: collapse; }
    #readme th, #readme td { border: 1px solid #e5e7eb; padding: 6px 8px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <ul class="links">
        <li><a href="./">Back to index</a></li>
      </ul>
      <article id="readme">Loading README.txt...</article>
    </section>
  </main>
  <script>
    (async function() {
      const target = document.getElementById("readme");
      try {
        const res = await fetch("./README.txt", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        const pre = document.createElement("pre");
        pre.textContent = text;
        target.replaceChildren(pre);
      } catch (e) {
        target.textContent = "Failed to load README.txt: " + e.message;
      }
    })();
  </script>
</body>
</html>
